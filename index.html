<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MetalFlow">
<meta name="theme-color" content="#060C1A">
<title>MetalFlow PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060C1A;--surface:#0A1020;--border:#111827;--border2:#1E293B;
  --text:#E2E8F0;--muted:#64748B;--dim:#334155;
  --blue:#3B82F6;--purple:#8B5CF6;--green:#10B981;--yellow:#F59E0B;--red:#EF4444;
  --line:#06C755;
  font-size:14px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans TC',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
#ham-btn{font-size:20px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 6px}
#top-title{flex:1;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text)}
#notif-btn{background:none;border:none;font-size:18px;cursor:pointer;position:relative;padding:4px}
.top-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-weight:800}
/* SIDEBAR */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;background:var(--surface);border-right:1px solid var(--border);z-index:1000;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#sidebar.open{transform:translateX(0)}
.side-logo{padding:max(22px,calc(env(safe-area-inset-top)+14px)) 18px 14px;display:flex;gap:12px;align-items:center}
.logo-mark{font-size:30px;color:var(--blue)}
.logo-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:.5px}
.side-nav{flex:1;padding:6px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;margin-bottom:2px;text-align:left;font-family:inherit;position:relative}
.nav-item.active{background:#0F2344;color:#60A5FA;font-weight:700}
.nav-ico{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800}
.side-footer{padding:14px 18px;border-top:1px solid var(--border)}
.user-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.line-status{display:flex;gap:6px;align-items:center}
.green-dot{width:6px;height:6px;border-radius:50%;background:var(--line);animation:pulse 2s infinite}
/* SCRIM */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:none}
#scrim.show{display:block}
/* CONTENT */
#content{flex:1;overflow-y:auto;padding:14px 12px 80px}
/* BOTTOM NAV */
#bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,4px)}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;font-size:9px;position:relative}
.bot-btn.active{color:#60A5FA}
.bot-ico{font-size:18px}
.bot-dot{position:absolute;top:6px;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:var(--line)}
/* CARDS */
.card{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;font-family:'Syne',sans-serif}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.kpi-card{background:var(--surface);border-radius:14px;padding:14px;cursor:pointer;border:1px solid var(--border)}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-family:'Syne',sans-serif}
.kpi-val{font-size:26px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:5px}
/* TAGS & PILLS */
.wo-tag{background:#0F2344;color:#60A5FA;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;font-family:monospace}
.pill{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;display:inline-block}
/* PROGRESS BAR */
.bar-bg{background:#0F172A;border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:6px;border-radius:4px;transition:width .6s}
/* BUTTONS */
.accent-btn{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.icon-btn{background:var(--border2);border:1px solid var(--dim);border-radius:8px;padding:7px 10px;color:#94A3B8;cursor:pointer;font-size:13px;font-family:inherit}
.adv-btn{background:#172554;border:none;border-radius:8px;padding:6px 10px;color:#60A5FA;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap}
.link-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:inherit}
.chip{background:var(--border2);border:1px solid var(--dim);border-radius:20px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.chip.on{background:#0F2344;border-color:var(--blue);color:#60A5FA}
/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.form-field{margin-bottom:10px}
label.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.4px}
input.inp,select.inp,textarea.inp{width:100%;background:#060C1A;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
/* MODAL */
#modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;display:none;align-items:flex-end;justify-content:center}
#modal-wrap.show{display:flex}
#modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;border:1px solid var(--border)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.close-btn{background:var(--border2);border:none;border-radius:50%;width:28px;height:28px;color:var(--muted);font-size:15px;cursor:pointer}
/* TOAST */
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);border-radius:12px;padding:11px 22px;color:#fff;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;display:none;font-family:'DM Sans',sans-serif}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 6px;text-align:left;color:var(--muted);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border2)}
.data-table td{padding:10px 6px;border-bottom:1px solid var(--border)}
/* ROW */
.row-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.line-ava{width:32px;height:32px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
/* CHART BAR */
.chart-bar-wrap{margin-bottom:12px}
.chart-bar-bg{background:#0F172A;border-radius:4px;height:10px;overflow:hidden;margin-top:4px}
.chart-bar-fill{height:10px;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
/* KANBAN */
.kanban-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;min-height:360px}
.kanban-col{min-width:178px;max-width:195px;flex-shrink:0;background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:border-color .2s}
.kanban-col.drag-over{border-color:var(--green)}
.kanban-head{padding:10px 12px;display:flex;gap:8px;align-items:center;font-weight:700;font-size:12px;font-family:'Syne',sans-serif}
.kanban-cnt{margin-left:auto;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;color:#fff}
.kanban-body{padding:8px;min-height:60px}
.kanban-card{background:var(--border2);border-radius:10px;padding:10px;margin-bottom:8px;cursor:grab;border:1px solid var(--dim)}
/* ANIMATE */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.slide-up{animation:slideUp .22s ease both}
.pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both}
/* LINE PREVIEW */
.line-preview{background:#1A2A1A;border-radius:10px;padding:12px;font-size:12px;color:#D1FAE5;line-height:1.8;white-space:pre-wrap;font-family:monospace;max-height:180px;overflow-y:auto}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.detail-key{font-size:12px;color:var(--muted)}
.detail-val{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:60%}
/* PIPE */
.pipe-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.pipe-node{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.pipe-dot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;transition:all .3s}
.pipe-lbl{font-size:8px;color:var(--muted);text-align:center;width:38px;line-height:1.2}
/* BOTTLENECK CHART */
.bn-wrap{display:flex;gap:5px;align-items:flex-end;height:90px;overflow-x:auto;padding-bottom:2px}
.bn-col{flex-shrink:0;width:42px;display:flex;flex-direction:column;align-items:center;gap:3px}
.bn-cnt{font-size:11px;font-weight:700}
.bn-bar{width:34px;border-radius:4px 4px 0 0;transition:height .7s}
.bn-lbl{font-size:8px;color:var(--muted);text-align:center;width:44px;line-height:1.2}
/* LOGIN SCREEN */
#login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:3000;flex-direction:column;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.login-logo{text-align:center;font-size:48px;margin-bottom:12px}
.login-title{text-align:center;font-size:24px;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:8px}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:14px}
.login-input{background:#060C1A;border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.login-input::placeholder{color:var(--dim)}
.login-input:focus{border-color:var(--blue)}
.login-btn{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:#7F1D1D;color:#FCA5A5;border:1px solid #7F1D1D;border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px;display:none}
.login-help{text-align:center;font-size:11px;color:var(--muted);margin-top:20px}
.login-toggle{background:none;border:none;color:var(--blue);cursor:pointer;font-weight:600;text-decoration:underline}
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">⬡</div>
    <div class="login-title">MetalFlow</div>
    <div class="login-sub">板金製程管理系統</div>
    <div class="login-err" id="login-err"></div>

    <!-- LOGIN FORM -->
    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <input class="login-input" type="email" id="login-email" placeholder="電子郵件" required>
      <input class="login-input" type="password" id="login-pass" placeholder="密碼" required>
      <button type="submit" class="login-btn" id="login-submit-btn">登入</button>
    </form>

    <!-- SIGNUP FORM -->
    <form class="login-form" id="signup-form" style="display:none" onsubmit="handleSignup(event)">
      <input class="login-input" type="email" id="signup-email" placeholder="電子郵件" required>
      <input class="login-input" type="password" id="signup-pass" placeholder="密碼（至少6位）" required>
      <input class="login-input" type="password" id="signup-pass2" placeholder="確認密碼" required>
      <button type="submit" class="login-btn" id="signup-submit-btn">建立帳號</button>
    </form>

    <div class="login-help">
      <span id="login-toggle-text">還沒有帳號？</span>
      <button type="button" class="login-toggle" id="login-toggle-btn" onclick="toggleLoginMode()">註冊</button>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="side-logo">
    <div class="logo-mark">⬡</div>
    <div>
      <div class="logo-name">MetalFlow</div>
      <div class="logo-sub">PRO · 板金製程管理</div>
    </div>
  </div>
  <nav class="side-nav" id="side-nav"></nav>
  <div class="side-footer">
    <div class="user-row">
      <div class="ava" id="user-ava">A</div>
      <div>
        <div style="font-size:13px;font-weight:700" id="user-name">User</div>
        <div style="font-size:11px;color:var(--muted)" id="user-role">管理者</div>
      </div>
    </div>
    <div class="line-status"><span class="green-dot"></span><span style="font-size:11px;color:var(--line)">已連線</span></div>
    <button style="background:none;border:none;color:var(--muted);font-size:11px;width:100%;text-align:left;padding:8px 0;cursor:pointer;margin-top:8px;font-family:inherit;transition:color .2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'" onclick="handleLogout()">登出</button>
  </div>
</div>
<div id="scrim"></div>
<!-- TOPBAR -->
<div id="topbar">
  <button id="ham-btn">☰</button>
  <div id="top-title">◈ 儀表板</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div style="font-size:11px;color:var(--muted)" id="top-date"></div>
    <button id="notif-btn">🔔<span class="top-badge" id="notif-badge" style="display:none">0</span></button>
  </div>
</div>
<!-- CONTENT -->
<div id="content"></div>
<!-- BOTTOM NAV -->
<nav id="bottom-nav"></nav>
<!-- MODAL -->
<div id="modal-wrap"><div id="modal-box"></div></div>
<!-- TOAST -->
<div id="toast"></div>
<script>
// ─── FIREBASE INIT ────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyCwH7RwT5omqL087UIdICp1tNeIE4HkzF8",
  authDomain:"metalflow-33843.firebaseapp.com",
  projectId:"metalflow-33843",
  storageBucket:"metalflow-33843.firebasestorage.app",
  messagingSenderId:"437288401026",
  appId:"1:437288401026:web:2a7f7a3892a061504ddc9b"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let currentUser=null, currentUserRole="operator";
let unsubscribeOrders=null, unsubscribeQuotes=null;

// ─── DATA ────────────────────────────────────────────────────
const STAGES=[
  {id:"inquiry",label:"詢價",icon:"📋",color:"#64748B"},
  {id:"quote",label:"報價",icon:"💰",color:"#8B5CF6"},
  {id:"order",label:"確認下單",icon:"✅",color:"#10B981"},
  {id:"material",label:"備料",icon:"🔩",color:"#F59E0B"},
  {id:"cutting",label:"雷射切割",icon:"⚡",color:"#EF4444"},
  {id:"bending",label:"折彎",icon:"🔧",color:"#EC4899"},
  {id:"welding",label:"焊接",icon:"🔥",color:"#F97316"},
  {id:"grinding",label:"研磨",icon:"⚙️",color:"#94A3B8"},
  {id:"coating",label:"塗裝",icon:"🎨",color:"#14B8A6"},
  {id:"qc",label:"品檢",icon:"🔍",color:"#6366F1"},
  {id:"shipping",label:"出貨",icon:"🚚",color:"#22C55E"},
];
const STAGE_IDS=STAGES.map(s=>s.id);
const STATUS_COLOR={"待處理":"#F59E0B","進行中":"#3B82F6","完成":"#22C55E","延誤":"#EF4444"};
const TABS=[
  {id:"dashboard",label:"儀表板",icon:"◈",roles:["admin","manager","operator","floor","sales"]},
  {id:"orders",label:"工單",icon:"⊞",roles:["admin","manager","operator","floor"]},
  {id:"flow",label:"看板",icon:"⟳",roles:["admin","manager","operator","floor"]},
  {id:"quotes",label:"報價",icon:"¥",roles:["admin","manager","sales"]},
  {id:"service",label:"售服",icon:"🔧",roles:["admin","manager","operator","floor","sales"]},
  {id:"receipts",label:"簽收單",icon:"📋",roles:["admin","manager","operator","floor","sales"]},
  {id:"accounting",label:"會計",icon:"💰",roles:["admin","manager"]},
  {id:"line",label:"LINE",icon:"◉",roles:["admin","manager"]},
  {id:"analytics",label:"分析",icon:"◎",roles:["admin","manager"]},
  {id:"users",label:"使用者",icon:"👥",roles:["admin"]},
  {id:"notif",label:"通知",icon:"◆",roles:["admin","manager","operator","floor","sales"]},
];
let state={
  tab:"dashboard",
  orders:[],
  quotes:[],
  users:[],
  serviceReports:[],
  receipts:[],
  invoices:[],
  payments:[],
  lineLog:[],
  notifications:[],
  acctTab:"daily",acctDateFilter:"",
  unread:0,
  orderSearch:"",orderStageFilter:"all",orderPriorityFilter:"all",
  quoteFormOpen:false,
  lineType:"stageAdvance",lineOrderId:"",lineQuoteId:"",lineCustomMsg:"",lineCustomTo:"",
  newOrderForm:{customer:"",part:"",qty:"",material:"",stage:"inquiry",priority:"中",deadline:"",amount:"",note:"",industry:"機械設備"},
  newQuoteForm:{customer:"",industry:"機械設備",part:"",qty:"",material:"",process:[],unitPrice:"",validDays:"30",note:""},
  orderWoCount:2409,quoteCount:835,
  dragId:null,
};
// ─── HELPERS ─────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const stg=id=>STAGES.find(s=>s.id===id);
const stgIdx=id=>STAGE_IDS.indexOf(id);
const daysLeft=deadline=>Math.ceil((new Date(deadline)-new Date())/86400000);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
// ─── PHOTO SYSTEM ────────────────────────────────────────────
function compressImage(file,maxW=800,quality=0.6){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        c.width=w;c.height=h;
        const ctx=c.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=c.toDataURL("image/jpeg",quality);
        if(dataUrl.length>300000){
          const dataUrl2=c.toDataURL("image/jpeg",0.3);
          resolve(dataUrl2);
        }else{resolve(dataUrl);}
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function handlePhotoUpload(event,targetId){
  const files=Array.from(event.target.files);
  if(!files.length)return;
  const existing=JSON.parse($(targetId).value||"[]");
  if(existing.length+files.length>5){showToast("最多上傳 5 張照片","error");return;}
  showToast("壓縮照片中...");
  for(const f of files){
    try{
      const dataUrl=await compressImage(f);
      existing.push({data:dataUrl,name:f.name,time:new Date().toISOString()});
    }catch(e){console.error("壓縮失敗:",e);}
  }
  $(targetId).value=JSON.stringify(existing);
  renderPhotoPreview(targetId,existing);
  showToast(`已加入 ${files.length} 張照片`);

};
function advanceOrder(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const si=stgIdx(o.stage); if(si>=STAGES.length-1)return;
  const ns=STAGE_IDS[si+1];
  $("modal-box").innerHTML=`
    <div class="modal-head"><div class="modal-title">▶ 推進工單 ${o.id}</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:10px;font-size:13px;color:var(--muted)">從 <strong style="color:var(--text)">${stg(o.stage)?.label}</strong> → <strong style="color:var(--green)">${stg(ns)?.label}</strong></div>
    ${photoInput("adv-photos")}
    <div style="display:flex;gap:10px">
      <button class="accent-btn" style="flex:1;padding:11px" onclick="confirmAdvance('${id}','${ns}')">✅ 確認推進</button>
      <button class="icon-btn" style="flex:1;padding:11px;text-align:center" onclick="closeModal()">取消</button>

async function confirmAdvance(id,ns){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const isShip=ns==="shipping";
  const msg=isShip?LT.shipping(o):LT.stageAdvance(o,ns);
  const newPhotos=JSON.parse($("adv-photos")?.value||"[]");
  const existing=o.photos||[];
  const allPhotos=existing.concat(newPhotos);
  sendLine(msg,o.customer,id);
  pushNotif(`${id} 推進至「${stg(ns)?.label}」`,"advance");
  try{
    await db.collection("orders").doc(id).set({stage:ns,status:isShip?"完成":"進行中",photos:allPhotos},{merge:true});
    showToast(`${id} 已推進至「${stg(ns)?.label}」`);
    closeModal();
  }catch(e){console.error("更新工單失敗:",e);showToast("推進失敗","error");}
}
function markDelay(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  sendLine(LT.delay(o),o.customer,id);
  pushNotif(`${id} 已標記延誤`,"warn");
  showToast("已標記延誤並通知客戶");
  db.collection("orders").doc(id).update({status:"延誤"})
    .catch(e=>console.error("更新工單失敗:",e));
}

function handleLogin(e){

async function setupNewUser(user){
  const usersRef=db.collection("users");
  const snap=await usersRef.get();
  const role=snap.empty?"admin":"floor";
  await usersRef.doc(user.uid).set({
    email:user.email,
    role:role,
    created:firebase.firestore.Timestamp.now(),
    displayName:user.email.split("@")[0]
  });
}

    if(unsubscribeQuotes)unsubscribeQuotes();
  });

      $("signup-form").style.display="none";

    }
    currentUser=user;

async function loadUserRole(){
  try{
    const snap=await db.collection("users").doc(currentUser.uid).get();
    if(snap.exists){
      currentUserRole=snap.data().role||"operator";
    }else{
      await setupNewUser(currentUser);
      currentUserRole="admin";
    }
    if(!state.tab||state.tab===""){
      const visibleTabs=TABS.filter(t=>t.roles.includes(currentUserRole));
      state.tab=visibleTabs[0]?.id||"dashboard";
    }
  }catch(e){
    console.error("載入角色失敗:",e);

async function subscribeToFirestore(){

  if(unsubscribeOrders)unsubscribeOrders();
  if(unsubscribeQuotes)unsubscribeQuotes();

  unsubscribeOrders=db.collection("orders")
    .onSnapshot(snap=>{
      state.orders=snap.docs.map(d=>({...d.data(),id:d.id}))
        .sort((a,b)=>{
          const aTime=(a.created?.toDate?.()?.getTime?.())||new Date(a.created||0).getTime();
          const bTime=(b.created?.toDate?.()?.getTime?.())||new Date(b.created||0).getTime();
          return bTime-aTime;
        });
      render();
    }, err=>console.error("訂閱工單失敗:",err));

  unsubscribeQuotes=db.collection("quotes")
    .onSnapshot(snap=>{
      state.quotes=snap.docs.map(d=>({...d.data(),id:d.id}))
        .sort((a,b)=>{
          const aTime=(a.createdTime?.toDate?.()?.getTime?.())||new Date(a.created||0).getTime();
          const bTime=(b.createdTime?.toDate?.()?.getTime?.())||new Date(b.created||0).getTime();
          return bTime-aTime;
        });

    }, err=>console.error("訂閱報價失敗:",err));

  db.collection("serviceReports")

        .sort((a,b)=>{
          const aTime=(a.createdTime?.toDate?.()?.getTime?.())||0;
          const bTime=(b.createdTime?.toDate?.()?.getTime?.())||0;
          return bTime-aTime;
        });
      render();
    }, err=>console.error("訂閱售服失敗:",err));

  db.collection("receipts")
    .onSnapshot(snap=>{
      state.receipts=snap.docs.map(d=>({...d.data(),id:d.id}))
        .sort((a,b)=>{
          const aTime=(a.createdTime?.toDate?.()?.getTime?.())||0;
          const bTime=(b.createdTime?.toDate?.()?.getTime?.())||0;
          return bTime-aTime;
        });
      render();
    }, err=>console.error("訂閱簽收單失敗:",err));

  db.collection("invoices")
    .onSnapshot(snap=>{
      state.invoices=snap.docs.map(d=>({...d.data(),id:d.id}))
        .sort((a,b)=>{
          const aTime=(a.createdTime?.toDate?.()?.getTime?.())||0;
          const bTime=(b.createdTime?.toDate?.()?.getTime?.())||0;
          return bTime-aTime;
        });
      render();

  db.collection("payments")
    .onSnapshot(snap=>{
      state.payments=snap.docs.map(d=>({...d.data(),id:d.id}))
        .sort((a,b)=>{
          const aTime=(a.createdTime?.toDate?.()?.getTime?.())||0;
          const bTime=(b.createdTime?.toDate?.()?.getTime?.())||0;
          return bTime-aTime;
        });
      render();
    }, err=>console.error("訂閱收付款失敗:",err));

  if(currentUserRole==="admin"){
    await loadAllUsers();
  }
}

function renderMonthlyReport(){

  const overdueCount=allUnpaid.filter(r=>{const d=r.createdTime?.toDate?.();return d&&(now-d)/(86400000)>30;}).length;

  monthPayments.filter(p=>p.type==="應收"&&p.status==="已收款").forEach(p=>{if(byCustomer[p.customer])byCustomer[p.customer].paid+=Number(p.amount||0);});

      <div class="kpi-card" style="border-top:3px solid #22C55E"><div class="kpi-label">本月收款</div><div class="kpi-val" style="color:#22C55E;font-size:18px">$${Math.round(totalReceived/1000)}K</div><div class="kpi-sub">已入帳</div></div>

      <div class="kpi-card" style="border-top:3px solid #8B5CF6"><div class="kpi-label">逾期30天</div><div class="kpi-val" style="color:#8B5CF6;font-size:18px">${overdueCount}</div><div class="kpi-sub">筆未收</div></div>
    </div>
  </div>

    ${Object.keys(byCustomer).length===0?'<div style="text-align:center;color:var(--muted);padding:12px 0;font-size:13px">本月無出貨記錄</div>':""}
    <div style="overflow-x:auto">${Object.keys(byCustomer).length>0?`<table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr style="color:var(--muted);text-align:left;border-bottom:1px solid var(--border2)"><th style="padding:8px 6px">客戶</th><th style="padding:8px 6px">出貨筆數</th><th style="padding:8px 6px">應收金額</th><th style="padding:8px 6px">已收款</th><th style="padding:8px 6px">未收款</th></tr>

        <td style="padding:8px 6px">${d.count}</td>

async function submitEditInvoice(id){
  const g=fid=>$(fid)?.value||"";
  const customer=g("einv-customer"),amount=g("einv-amount");
  if(!customer||!amount){showToast("請填必填欄位","error");return;}
  const photos=JSON.parse(g("einv-photos")||"[]");
  const updates={customer,invoiceNo:g("einv-no"),direction:g("einv-direction"),amount:parseFloat(amount),tax:parseFloat(g("einv-tax"))||0,status:g("einv-status"),ref:g("einv-ref"),invoiceDate:g("einv-date"),description:g("einv-desc"),photos};
  try{
    await db.collection("invoices").doc(id).set(updates,{merge:true});
    pushNotif(`發票 ${id} 已更新`,"success");showToast("已更新");closeModal();
  }catch(e){showToast("更新失敗","error");}

async function deleteInvoice(id){

    await db.collection("invoices").doc(id).delete();

}

function renderAnalytics(){
  if(currentUserRole==="sales"||currentUserRole==="operator"||currentUserRole==="floor")return `<div class="card"><div style="padding:20px;text-align:center;color:var(--muted)">只有主管和管理員可以查看分析數據。</div></div>`;
  const orders=state.orders;

  const byInd={},indRev={};
  orders.forEach(o=>{byInd[o.industry]=(byInd[o.industry]||0)+1;indRev[o.industry]=(indRev[o.industry]||0)+o.amount;});
  const maxRev=Math.max(...Object.values(indRev),1);

  const customers=Object.values(custMap).sort((a,b)=>b.revenue-a.revenue);
  const sc={};STAGES.forEach(s=>{sc[s.id]=orders.filter(o=>o.stage===s.id).length;});

  <div class="card">
    <div class="card-title">製程瓶頸分析</div>

      ${STAGES.map(s=>{
        const cnt=sc[s.id]||0, h=Math.max(4,Math.round(cnt/maxSc*72));
        return `<div class="bn-col">
          <div class="bn-cnt" style="color:${cnt>1?"#EF4444":cnt===1?"#F59E0B":"#334155"}">${cnt}</div>
          <div class="bn-bar" style="height:${h}px;background:${cnt>1?"#EF4444":cnt===1?"#F59E0B":"#1E293B"}"></div>

    <div style="overflow-x:auto">
      <table class="data-table">

        <tbody>${customers.map((c,i)=>`<tr>
          <td style="color:${i<3?"#F59E0B":"var(--muted)"};font-weight:700">${i+1}</td>
          <td style="font-weight:600;white-space:nowrap">${esc(c.name)}</td>
          <td style="color:var(--muted);text-align:center">${c.orders}</td>
          <td style="color:#10B981;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap">${c.revenue>0?`$${Math.round(c.revenue/1000)}K`:"—"}</td>
          <td><span class="pill" style="background:${c.delayed>0?"#7F1D1D":"#14532D"};color:${c.delayed>0?"#FCA5A5":"#86EFAC"};font-size:10px">${c.orders>0?Math.round(c.delayed/c.orders*100):0}%</span></td>
        </tr>`).join("")}</tbody>

    </div>

function renderContent(){render();}
function setPFilter(v){state.orderPriorityFilter=v;renderContent();}

function onDrop(sid){if(state.dragId){advanceToStage(state.dragId,sid);state.dragId=null;}}
function advanceToStage(id,sid){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const ns=sid, isShip=ns==="shipping";
  const msg=isShip?LT.shipping(o):LT.stageAdvance(o,ns);
  sendLine(msg,o.customer,id);
  pushNotif(`${id} 移至「${stg(ns)?.label}」`,"advance");
  db.collection("orders").doc(id).update({stage:ns,status:isShip?"完成":"進行中"})
    .catch(e=>console.error("更新工單失敗:",e));
}
function toggleProcess(p){
  const f=state.newQuoteForm;
  f.process=f.process.includes(p)?f.process.filter(x=>x!==p):[...f.process,p];
  renderContent();
}
function doSendLine(){
  const lt=state.lineType;
  const lo=state.orders.find(x=>x.id===state.lineOrderId)||state.orders[0];
  const lq=state.quotes.find(x=>x.id===state.lineQuoteId)||state.quotes[0];
  let msg="",to="";
  if(lt==="stageAdvance"&&lo){const si=stgIdx(lo.stage);const ns=STAGE_IDS[Math.min(si+1,STAGES.length-1)];msg=LT.stageAdvance(lo,ns);to=lo.customer;}
  else if(lt==="delay"&&lo){msg=LT.delay(lo);to=lo.customer;}
  else if(lt==="quoteReady"&&lq){msg=LT.quoteReady(lq);to=lq.customer;}
  else if(lt==="shipping"&&lo){msg=LT.shipping(lo);to=lo.customer;}
  else if(lt==="custom"){msg=state.lineCustomMsg;to=state.lineCustomTo||"客戶";}
  if(!msg.trim()){showToast("訊息不可空白","error");return;}
  sendLine(msg,to);
  render();
}
function confirmQuote(id){
  const q=state.quotes.find(x=>x.id===id); if(!q)return;
  sendLine(LT.quoteReady(q),q.customer,id);
  pushNotif(`報價 ${id} 已接單`,"success");
  db.collection("quotes").doc(id).update({status:"已接單"})
    .catch(e=>console.error("更新報價失敗:",e));
}
function resendLine(id){

async function submitQuote(){
  const f=state.newQuoteForm;
  if(!f.customer||!f.qty||!f.unitPrice){showToast("請填必填欄位","error");return;}
  const total=parseInt(f.qty)*parseFloat(f.unitPrice);
  const qId=`QT-${String(state.quoteCount++).padStart(4,"0")}`;
  const nq={customer:f.customer, industry:f.industry, part:f.part, qty:parseInt(f.qty), material:f.material, process:[...f.process], unitPrice:parseFloat(f.unitPrice), total, validDays:parseInt(f.validDays)||30, status:"報價中", note:f.note, created:new Date().toISOString().slice(0,10), createdBy:currentUser.uid, createdTime:firebase.firestore.Timestamp.now()};
  try{
    await db.collection("quotes").doc(qId).set(nq);
    sendLine(LT.quoteReady({...nq,id:qId}),f.customer,qId);

}
