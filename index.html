<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060C1A;--surface:#0A1020;--border:#111827;--border2:#1E293B;
  --text:#E2E8F0;--muted:#64748B;--dim:#334155;
  --blue:#3B82F6;--purple:#8B5CF6;--green:#10B981;--yellow:#F59E0B;--red:#EF4444;
  --line:#06C755;
  font-size:14px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans TC',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
#ham-btn{font-size:20px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 6px}
#top-title{flex:1;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text)}
#notif-btn{background:none;border:none;font-size:18px;cursor:pointer;position:relative;padding:4px}
.top-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;font-size:9px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-weight:800}
/* SIDEBAR */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;background:var(--surface);border-right:1px solid var(--border);z-index:1000;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#sidebar.open{transform:translateX(0)}
.side-logo{padding:max(22px,calc(env(safe-area-inset-top)+14px)) 18px 14px;display:flex;gap:12px;align-items:center}
.logo-mark{font-size:30px;color:var(--blue)}
.logo-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:.5px}
.side-nav{flex:1;padding:6px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;margin-bottom:2px;text-align:left;font-family:inherit;position:relative}
.nav-item.active{background:#0F2344;color:#60A5FA;font-weight:700}
.nav-ico{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800}
.side-footer{padding:14px 18px;border-top:1px solid var(--border)}
.user-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.line-status{display:flex;gap:6px;align-items:center}
.green-dot{width:6px;height:6px;border-radius:50%;background:var(--line);animation:pulse 2s infinite}
/* SCRIM */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:none}
#scrim.show{display:block}
/* CONTENT */
#content{flex:1;overflow-y:auto;padding:14px 12px 80px}
/* BOTTOM NAV */
#bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,4px)}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 7px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;font-size:9px;position:relative}
.bot-btn.active{color:#60A5FA}
.bot-ico{font-size:18px}
.bot-dot{position:absolute;top:6px;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:var(--line)}
/* CARDS */
.card{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;font-family:'Syne',sans-serif}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.kpi-card{background:var(--surface);border-radius:14px;padding:14px;cursor:pointer;border:1px solid var(--border)}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-family:'Syne',sans-serif}
.kpi-val{font-size:26px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:5px}
/* TAGS & PILLS */
.wo-tag{background:#0F2344;color:#60A5FA;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;font-family:monospace}
.pill{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;display:inline-block}
/* PROGRESS BAR */
.bar-bg{background:#0F172A;border-radius:4px;height:6px;overflow:hidden}
.bar-fill{height:6px;border-radius:4px;transition:width .6s}
/* BUTTONS */
.accent-btn{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.icon-btn{background:var(--border2);border:1px solid var(--dim);border-radius:8px;padding:7px 10px;color:#94A3B8;cursor:pointer;font-size:13px;font-family:inherit}
.adv-btn{background:#172554;border:none;border-radius:8px;padding:6px 10px;color:#60A5FA;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap}
.link-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:inherit}
.chip{background:var(--border2);border:1px solid var(--dim);border-radius:20px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.chip.on{background:#0F2344;border-color:var(--blue);color:#60A5FA}
/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.form-field{margin-bottom:10px}
label.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.4px}
input.inp,select.inp,textarea.inp{width:100%;background:#060C1A;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
/* MODAL */
#modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;display:none;align-items:flex-end;justify-content:center}
#modal-wrap.show{display:flex}
#modal-box{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;border:1px solid var(--border)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.close-btn{background:var(--border2);border:none;border-radius:50%;width:28px;height:28px;color:var(--muted);font-size:15px;cursor:pointer}
/* TOAST */
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);border-radius:12px;padding:11px 22px;color:#fff;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;display:none;font-family:'DM Sans',sans-serif}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 6px;text-align:left;color:var(--muted);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border2)}
.data-table td{padding:10px 6px;border-bottom:1px solid var(--border)}
/* ROW */
.row-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.line-ava{width:32px;height:32px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
/* CHART BAR */
.chart-bar-wrap{margin-bottom:12px}
.chart-bar-bg{background:#0F172A;border-radius:4px;height:10px;overflow:hidden;margin-top:4px}
.chart-bar-fill{height:10px;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
/* KANBAN */
.kanban-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;min-height:360px}
.kanban-col{min-width:178px;max-width:195px;flex-shrink:0;background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);transition:border-color .2s}
.kanban-col.drag-over{border-color:var(--green)}
.kanban-head{padding:10px 12px;display:flex;gap:8px;align-items:center;font-weight:700;font-size:12px;font-family:'Syne',sans-serif}
.kanban-cnt{margin-left:auto;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;color:#fff}
.kanban-body{padding:8px;min-height:60px}
.kanban-card{background:var(--border2);border-radius:10px;padding:10px;margin-bottom:8px;cursor:grab;border:1px solid var(--dim)}
/* ANIMATE */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.slide-up{animation:slideUp .22s ease both}
.pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both}
/* LINE PREVIEW */
.line-preview{background:#1A2A1A;border-radius:10px;padding:12px;font-size:12px;color:#D1FAE5;line-height:1.8;white-space:pre-wrap;font-family:monospace;max-height:180px;overflow-y:auto}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.detail-key{font-size:12px;color:var(--muted)}
.detail-val{font-size:13px;color:var(--text);font-weight:500;text-align:right;max-width:60%}
/* PIPE */
.pipe-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.pipe-node{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.pipe-dot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;transition:all .3s}
.pipe-lbl{font-size:8px;color:var(--muted);text-align:center;width:38px;line-height:1.2}
/* BOTTLENECK CHART */
.bn-wrap{display:flex;gap:5px;align-items:flex-end;height:90px;overflow-x:auto;padding-bottom:2px}
.bn-col{flex-shrink:0;width:42px;display:flex;flex-direction:column;align-items:center;gap:3px}
.bn-cnt{font-size:11px;font-weight:700}
.bn-bar{width:34px;border-radius:4px 4px 0 0;transition:height .7s}
.bn-lbl{font-size:8px;color:var(--muted);text-align:center;width:44px;line-height:1.2}
/* LOGIN SCREEN */
#login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:3000;flex-direction:column;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.login-logo{text-align:center;font-size:48px;margin-bottom:12px}
.login-title{text-align:center;font-size:24px;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:8px}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:14px}
.login-input{background:#060C1A;border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.login-input::placeholder{color:var(--dim)}
.login-input:focus{border-color:var(--blue)}
.login-btn{background:linear-gradient(135deg,#2563EB,#7C3AED);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:#7F1D1D;color:#FCA5A5;border:1px solid #7F1D1D;border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px;display:none}
.login-help{text-align:center;font-size:11px;color:var(--muted);margin-top:20px}
.login-toggle{background:none;border:none;color:var(--blue);cursor:pointer;font-weight:600;text-decoration:underline}
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div id="login-wrap">
  <div class="login-card">
    <div class="login-logo">⬡</div>
    <div class="login-title">MetalFlow</div>
    <div class="login-sub">板金製程管理系統</div>
    <div class="login-err" id="login-err"></div>

    <!-- LOGIN FORM -->
    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <input class="login-input" type="email" id="login-email" placeholder="電子郵件" required>
      <input class="login-input" type="password" id="login-pass" placeholder="密碼" required>
      <button type="submit" class="login-btn" id="login-submit-btn">登入</button>
    </form>

    <!-- SIGNUP FORM -->
    <form class="login-form" id="signup-form" style="display:none" onsubmit="handleSignup(event)">
      <input class="login-input" type="email" id="signup-email" placeholder="電子郵件" required>
      <input class="login-input" type="password" id="signup-pass" placeholder="密碼（至少6位）" required>
      <input class="login-input" type="password" id="signup-pass2" placeholder="確認密碼" required>
      <button type="submit" class="login-btn" id="signup-submit-btn">建立帳號</button>
    </form>

    <div class="login-help">
      <span id="login-toggle-text">還沒有帳號？</span>
      <button type="button" class="login-toggle" id="login-toggle-btn" onclick="toggleLoginMode()">註冊</button>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="side-logo">
    <div class="logo-mark">⬡</div>
    <div>
      <div class="logo-name">MetalFlow</div>
      <div class="logo-sub">PRO · 板金製程管理</div>
    </div>
  </div>

      </div>
    </div>
    <div class="line-status"><span class="green-dot"></span><span style="font-size:11px;color:var(--line)">已連線</span></div>
    <button style="background:none;border:none;color:var(--muted);font-size:11px;width:100%;text-align:left;padding:8px 0;cursor:pointer;margin-top:8px;font-family:inherit;transition:color .2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'" onclick="handleLogout()">登出</button>
  </div>
</div>
<div id="scrim"></div>
<!-- TOPBAR -->
<div id="topbar">
  <button id="ham-btn">☰</button>
  <div id="top-title">◈ 儀表板</div>
  <div style="display:flex;gap:8px;align-items:center">
    <div style="font-size:11px;color:var(--muted)" id="top-date"></div>
    <button id="notif-btn">🔔<span class="top-badge" id="notif-badge" style="display:none">0</span></button>
  </div>
</div>
<!-- CONTENT -->
<div id="content"></div>
<!-- BOTTOM NAV -->
<nav id="bottom-nav"></nav>
<!-- MODAL -->
<div id="modal-wrap"><div id="modal-box"></div></div>
<!-- TOAST -->
<div id="toast"></div>
<script>

// ─── PHOTO SYSTEM ────────────────────────────────────────────
function compressImage(file,maxW=800,quality=0.6){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        c.width=w;c.height=h;
        const ctx=c.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=c.toDataURL("image/jpeg",quality);
        if(dataUrl.length>300000){
          const dataUrl2=c.toDataURL("image/jpeg",0.3);
          resolve(dataUrl2);
        }else{resolve(dataUrl);}
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function handlePhotoUpload(event,targetId){
  const files=Array.from(event.target.files);
  if(!files.length)return;
  const existing=JSON.parse($(targetId).value||"[]");
  if(existing.length+files.length>5){showToast("最多上傳 5 張照片","error");return;}
  showToast("壓縮照片中...");
  for(const f of files){
    try{
      const dataUrl=await compressImage(f);
      existing.push({data:dataUrl,name:f.name,time:new Date().toISOString()});
    }catch(e){console.error("壓縮失敗:",e);}
  }
  $(targetId).value=JSON.stringify(existing);
  renderPhotoPreview(targetId,existing);
  showToast(`已加入 ${files.length} 張照片`);
}

}

  quoteReady(q){const p=(q.process||[]).join(" · ")||"—";return `💰【MetalFlow 報價通知】\n━━━━━━━━━━━━━━\n📋 報價單：${q.id}\n👤 客戶：${q.customer}\n🔧 品名：${q.part} ×${q.qty}\n🔩 製程：${p}\n\n💵 報價金額：NT$ ${(+q.total).toLocaleString()}\n📅 有效期限：${q.validDays} 天\n\n回覆「確認 ${q.id}」即完成下單\n━━━━━━━━━━━━━━`;},

};
function advanceOrder(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const si=stgIdx(o.stage); if(si>=STAGES.length-1)return;
  const ns=STAGE_IDS[si+1];
  $("modal-box").innerHTML=`
    <div class="modal-head"><div class="modal-title">▶ 推進工單 ${o.id}</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:10px;font-size:13px;color:var(--muted)">從 <strong style="color:var(--text)">${stg(o.stage)?.label}</strong> → <strong style="color:var(--green)">${stg(ns)?.label}</strong></div>
    ${photoInput("adv-photos")}
    <div style="display:flex;gap:10px">
      <button class="accent-btn" style="flex:1;padding:11px" onclick="confirmAdvance('${id}','${ns}')">✅ 確認推進</button>
      <button class="icon-btn" style="flex:1;padding:11px;text-align:center" onclick="closeModal()">取消</button>
    </div>`;
  $("modal-wrap").classList.add("show");
}
async function confirmAdvance(id,ns){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const isShip=ns==="shipping";
  const msg=isShip?LT.shipping(o):LT.stageAdvance(o,ns);
  const newPhotos=JSON.parse($("adv-photos")?.value||"[]");
  const existing=o.photos||[];
  const allPhotos=existing.concat(newPhotos);
  sendLine(msg,o.customer,id);
  pushNotif(`${id} 推進至「${stg(ns)?.label}」`,"advance");
  try{
    await db.collection("orders").doc(id).set({stage:ns,status:isShip?"完成":"進行中",photos:allPhotos},{merge:true});
    showToast(`${id} 已推進至「${stg(ns)?.label}」`);
    closeModal();
  }catch(e){console.error("更新工單失敗:",e);showToast("推進失敗","error");}
}
function markDelay(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  sendLine(LT.delay(o),o.customer,id);
  pushNotif(`${id} 已標記延誤`,"warn");
  showToast("已標記延誤並通知客戶");
  db.collection("orders").doc(id).update({status:"延誤"})
    .catch(e=>console.error("更新工單失敗:",e));
}

  $("login-err").textContent="❌ "+msg;

}
function handleLogin(e){
  e.preventDefault();
  const email=document.getElementById("login-email")?.value||"";
  const pass=document.getElementById("login-pass")?.value||"";
  if(!email||!pass){showLoginError("請輸入電子郵件和密碼");return;}
  $("login-submit-btn").disabled=true;
  auth.signInWithEmailAndPassword(email,pass)
    .then(u=>{showToast("登入成功"); hideLoginScreen();})
    .catch(er=>{showLoginError(er.message); $("login-submit-btn").disabled=false;});
}
function handleSignup(e){
  e.preventDefault();
  const email=document.getElementById("signup-email")?.value||"";
  const pass=document.getElementById("signup-pass")?.value||"";
  const pass2=document.getElementById("signup-pass2")?.value||"";
  if(pass!==pass2){showLoginError("密碼不符"); return;}
  if(pass.length<6){showLoginError("密碼至少6位"); return;}
  $("signup-submit-btn").disabled=true;
  auth.createUserWithEmailAndPassword(email,pass)
    .then(u=>{return setupNewUser(u.user);})
    .then(()=>{showToast("帳號建立成功，已登入"); hideLoginScreen();})
    .catch(er=>{showLoginError(er.message); $("signup-submit-btn").disabled=false;});
}
async function setupNewUser(user){
  const usersRef=db.collection("users");
  const snap=await usersRef.get();
  const role=snap.empty?"admin":"floor";
  await usersRef.doc(user.uid).set({
    email:user.email,
    role:role,
    created:firebase.firestore.Timestamp.now(),
    displayName:user.email.split("@")[0]
  });
}
function handleLogout(){
  auth.signOut().then(()=>{
    state.orders=[]; state.quotes=[];
    showToast("已登出");
    if(unsubscribeOrders)unsubscribeOrders();
    if(unsubscribeQuotes)unsubscribeQuotes();
  });
}
function onAuthStateChanged(){
  auth.onAuthStateChanged(async user=>{
    if(!user){
      showLoginScreen();
      $("login-form").style.display="flex";
      $("signup-form").style.display="none";
      return;
    }
    currentUser=user;
    hideLoginScreen();
    await loadUserRole();
    subscribeToFirestore();
    updateUserDisplay();
    render();
  });
}
async function loadUserRole(){
  try{
    const snap=await db.collection("users").doc(currentUser.uid).get();
    if(snap.exists){
      currentUserRole=snap.data().role||"operator";
    }else{
      await setupNewUser(currentUser);
      currentUserRole="admin";
    }
    if(!state.tab||state.tab===""){
      const visibleTabs=TABS.filter(t=>t.roles.includes(currentUserRole));
      state.tab=visibleTabs[0]?.id||"dashboard";
    }
  }catch(e){
    console.error("載入角色失敗:",e);
    currentUserRole="operator";
  }
}
function updateUserDisplay(){
  const ava=$("user-ava"), name=$("user-name"), role=$("user-role");
  if(currentUser){
    ava.textContent=(currentUser.email||"U").charAt(0).toUpperCase();
    name.textContent=currentUser.email.split("@")[0]||"User";
    const roleLabel={admin:"系統管理員",manager:"主管",operator:"操作員",floor:"現場人員",sales:"業務",purchaser:"採購人員",designer:"設計師"}[currentUserRole]||"使用者";
    role.textContent=roleLabel;
  }
}

  $("scrim").classList.remove("show");

function render(){

  $("top-date").textContent=new Date().toLocaleDateString("zh-TW",{month:"short",day:"numeric",weekday:"short"});

  else if(state.tab==="service") c.innerHTML=renderService();
  else if(state.tab==="receipts") c.innerHTML=renderReceipts();
  else if(state.tab==="accounting") c.innerHTML=renderAccounting();
  else if(state.tab==="purchase") c.innerHTML=renderPurchase();
  else if(state.tab==="warehouse") c.innerHTML=renderWarehouse();

  const delayed=state.orders.filter(o=>o.status==="延誤").length;
  const revenue=state.orders.filter(o=>o.status==="完成").reduce((s,o)=>s+o.amount,0);
  const pending=state.quotes.filter(q=>q.status==="待確認").length;
  const sc={};STAGES.forEach(s=>{sc[s.id]=state.orders.filter(o=>o.stage===s.id).length;});

function renderAccounting(){
  if(currentUserRole!=="admin"&&currentUserRole!=="manager"){
    return `<div class="card"><div style="padding:20px;text-align:center;color:var(--muted)">只有主管和管理員可以查看會計系統。</div></div>`;
  }
  const tabs=[{id:"daily",label:"📊 日報"},{id:"monthly",label:"📈 月報"},{id:"receivable",label:"💵 應收"},{id:"payable",label:"💸 應付"},{id:"invoices",label:"🧾 發票"}];
  const tabBar=tabs.map(t=>`<button class="chip${state.acctTab===t.id?" on":""}" onclick="state.acctTab='${t.id}';renderContent()">${t.label}</button>`).join("");
  let content="";

  else if(state.acctTab==="monthly") content=renderMonthlyReport();

function todayStr(){return new Date().toISOString().slice(0,10);}
function dateStr(ts){return ts?.toDate?.()?ts.toDate().toISOString().slice(0,10):"";}
function renderDailyReport(){
  const today=state.acctDateFilter||todayStr();
  const dayReceipts=state.receipts.filter(r=>dateStr(r.createdTime)===today);
  const daySignedReceipts=state.receipts.filter(r=>dateStr(r.signedTime)===today);
  const dayPayments=state.payments.filter(p=>dateStr(p.createdTime)===today);
  const dayInvoices=state.invoices.filter(i=>dateStr(i.createdTime)===today);

function renderMonthlyReport(){

  const monthReceipts=state.receipts.filter(r=>(dateStr(r.createdTime)||"").startsWith(ym));
  const monthPayments=state.payments.filter(p=>(dateStr(p.createdTime)||"").startsWith(ym));
  const totalShipped=monthReceipts.reduce((s,r)=>s+Number(r.amount||0),0);
  const totalReceived=monthPayments.filter(p=>p.type==="應收"&&p.status==="已收款").reduce((s,p)=>s+Number(p.amount||0),0);
  const totalPaid=monthPayments.filter(p=>p.type==="應付"&&p.status==="已付款").reduce((s,p)=>s+Number(p.amount||0),0);
  const allUnpaid=state.receipts.filter(r=>r.paymentStatus!=="已收款");
  const overdueCount=allUnpaid.filter(r=>{const d=r.createdTime?.toDate?.();return d&&(now-d)/(86400000)>30;}).length;
  // group by customer
  const byCustomer={};monthReceipts.forEach(r=>{if(!byCustomer[r.customer])byCustomer[r.customer]={count:0,amount:0,paid:0};byCustomer[r.customer].count++;byCustomer[r.customer].amount+=Number(r.amount||0);});
  monthPayments.filter(p=>p.type==="應收"&&p.status==="已收款").forEach(p=>{if(byCustomer[p.customer])byCustomer[p.customer].paid+=Number(p.amount||0);});

        <td style="padding:8px 6px">${d.count}</td>

  const photos=JSON.parse(g("pay-photos")||"[]");

const INV_CATS=["原料","零件","成品","耗材","半成品","其他"];

function renderWarehouse(){
  const tabs=[{id:"stock",label:"📦 庫存總覽"},{id:"inout",label:"📥 入出庫"},{id:"check",label:"📋 盤點"},{id:"transfer",label:"🔄 調撥"},{id:"ledger",label:"📊 明細帳"}];
  const tabBar=tabs.map(t=>`<button class="chip${state.whTab===t.id?" on":""}" onclick="state.whTab='${t.id}';renderContent()">${t.label}</button>`).join("");
  let content="";
  if(state.whTab==="stock") content=renderStock();
  else if(state.whTab==="inout") content=renderInOut();
  else if(state.whTab==="check") content=renderStockCheck();
  else if(state.whTab==="transfer") content=renderTransfer();
  else if(state.whTab==="ledger") content=renderLedger();
  return `<div class="card"><div style="display:flex;gap:8px;flex-wrap:wrap">${tabBar}</div></div>${content}`;
}
function renderStock(){
  const inv=state.inventory;
  const lowStock=inv.filter(i=>i.safetyStock&&i.qty<=i.safetyStock);
  const totalValue=inv.reduce((s,i)=>s+(i.qty||0)*(i.unitCost||0),0);
  const byCat={};inv.forEach(i=>{const c=i.category||"其他";if(!byCat[c])byCat[c]=0;byCat[c]++;});
  return `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-top:3px solid #3B82F6"><div class="kpi-label">品項總數</div><div class="kpi-val" style="color:#3B82F6">${inv.length}</div></div>
    <div class="kpi-card" style="border-top:3px solid #EF4444"><div class="kpi-label">低庫存警示</div><div class="kpi-val" style="color:#EF4444">${lowStock.length}</div></div>
    <div class="kpi-card" style="border-top:3px solid #F59E0B"><div class="kpi-label">庫存總值</div><div class="kpi-val" style="color:#F59E0B;font-size:18px">$${Math.round(totalValue/1000)}K</div></div>
    <div class="kpi-card" style="border-top:3px solid #22C55E"><div class="kpi-label">分類數</div><div class="kpi-val" style="color:#22C55E">${Object.keys(byCat).length}</div></div>
  </div>

async function submitStock(type){
  const g=id=>$(id)?.value||"";
  const itemId=g("stk-item"),qty=parseInt(g("stk-qty"));
  if(!itemId||!qty||qty<=0){showToast("請選擇品項和輸入數量","error");return;}
  const item=state.inventory.find(x=>x.id===itemId);if(!item)return;
  const isIn=type==="入庫";
  const newQty=isIn?(item.qty||0)+qty:(item.qty||0)-qty;
  if(newQty<0){showToast("出庫數量不可超過庫存","error");return;}
  const photos=JSON.parse(g("stk-photos")||"[]");
  const logId=`SL-${Date.now()}`;
  try{
    await db.collection("inventory").doc(itemId).set({qty:newQty},{merge:true});
    await db.collection("stockLogs").doc(logId).set({itemId,itemName:item.name,type,qty:isIn?qty:-qty,balanceAfter:newQty,reason:g("stk-reason"),orderId:g("stk-order"),poId:g("stk-po")||"",note:g("stk-note"),photos,createdTime:firebase.firestore.Timestamp.now(),createdBy:currentUser.uid});
    pushNotif(`${item.name} ${type} ${qty} ${item.unit||"件"}，結餘 ${newQty}`,"success");showToast(`${type}完成`);closeModal();
  }catch(e){showToast(`${type}失敗`,"error");}
}

function startStockCheck(){
  const area=$("stock-check-area");if(!area)return;
  if(state.inventory.length===0){showToast("尚無品項可盤點","error");return;}
  area.innerHTML=`
    <div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr style="color:var(--muted);border-bottom:1px solid var(--border2)"><th style="padding:8px 6px;text-align:left">品名</th><th style="padding:8px 6px">規格</th><th style="padding:8px 6px">帳面數量</th><th style="padding:8px 6px">實際數量</th><th style="padding:8px 6px">差異</th></tr>
      ${state.inventory.map(i=>`<tr style="border-bottom:1px solid var(--border)" data-item-id="${i.id}" data-book-qty="${i.qty||0}">
        <td style="padding:8px 6px;font-weight:600">${esc(i.name)}</td>
        <td style="padding:8px 6px;text-align:center">${esc(i.spec||"—")}</td>
        <td style="padding:8px 6px;text-align:center">${i.qty||0} ${esc(i.unit||"件")}</td>
        <td style="padding:8px 6px;text-align:center"><input class="inp sc-actual" type="number" style="width:80px;text-align:center" value="${i.qty||0}" oninput="calcDiff(this)"></td>
        <td style="padding:8px 6px;text-align:center;font-weight:700" class="sc-diff">0</td>
      </tr>`).join("")}
    </table></div>
    <button class="accent-btn" style="width:100%;padding:12px;margin-top:14px" onclick="submitStockCheck()">✅ 提交盤點結果</button>`;
}
function calcDiff(el){
  const row=el.closest("tr");
  const book=parseInt(row.dataset.bookQty)||0;
  const actual=parseInt(el.value)||0;
  const diff=actual-book;
  const cell=row.querySelector(".sc-diff");
  cell.textContent=diff>0?`+${diff}`:String(diff);
  cell.style.color=diff>0?"#22C55E":diff<0?"#EF4444":"var(--muted)";
}
async function submitStockCheck(){
  const rows=document.querySelectorAll("#stock-check-area tr[data-item-id]");
  let adjusted=0;
  for(const row of rows){
    const itemId=row.dataset.itemId;
    const bookQty=parseInt(row.dataset.bookQty)||0;
    const actual=parseInt(row.querySelector(".sc-actual")?.value)||0;
    const diff=actual-bookQty;
    if(diff===0)continue;
    const item=state.inventory.find(x=>x.id===itemId);if(!item)continue;
    try{
      await db.collection("inventory").doc(itemId).set({qty:actual},{merge:true});
      await db.collection("stockLogs").doc(`SL-${Date.now()}-${adjusted}`).set({itemId,itemName:item.name,type:diff>0?"盤盈":"盤虧",qty:diff,balanceAfter:actual,reason:"庫存盤點",createdTime:firebase.firestore.Timestamp.now(),createdBy:currentUser.uid});
      adjusted++;
    }catch(e){console.error("盤點更新失敗:",e);}
  }
  pushNotif(`盤點完成，${adjusted} 項品項已調整`,"success");
  showToast(`盤點完成，${adjusted} 項已調整`);
  renderContent();
}

async function submitTransfer(){
  const g=id=>$(id)?.value||"";
  const itemId=g("tf-item"),qty=parseInt(g("tf-qty")),dest=g("tf-dest");
  if(!itemId||!qty||!dest){showToast("請填完所有欄位","error");return;}
  const item=state.inventory.find(x=>x.id===itemId);if(!item)return;
  if(qty>item.qty){showToast("調撥數量不可超過庫存","error");return;}
  const ts=Date.now();

async function deleteDesign(id){

  try{await db.collection("designProjects").doc(id).delete();showToast("已刪除");closeModal();}catch(e){showToast("刪除失敗","error");}
}

function addBomRow(){
  const list=$("dsg-bom-list");if(!list)return;
  const row=document.createElement("div");
  row.className="bom-row";
  row.style.cssText="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;margin-top:6px;align-items:end";
  row.innerHTML=`<input class="inp bom-name" placeholder="品名"><input class="inp bom-spec" placeholder="規格"><input class="inp bom-qty" type="number" placeholder="數量"><input class="inp bom-mat" placeholder="材質"><button class="icon-btn" style="color:#EF4444;padding:8px" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}
async function submitDesignStages(id){
  const stageEls=document.querySelectorAll("#dsg-stage-list > div[data-stage]");
  const stages={};
  let allDone=true,anyActive=false;
  stageEls.forEach(el=>{
    const sid=el.dataset.stage;
    const status=el.querySelector(".dss-status")?.value||"待開始";
    if(status!=="完成")allDone=false;
    if(status==="進行中")anyActive=true;
    stages[sid]={status,estHours:parseFloat(el.querySelector(".dss-est")?.value)||0,actHours:parseFloat(el.querySelector(".dss-act")?.value)||0,startTime:el.querySelector(".dss-start")?.value||"",endTime:el.querySelector(".dss-end")?.value||"",note:el.querySelector(".dss-note")?.value||""};
  });
  const bomRows=document.querySelectorAll(".bom-row");
  const bom=[];
  bomRows.forEach(row=>{
    const name=row.querySelector(".bom-name")?.value||"";
    if(name)bom.push({name,spec:row.querySelector(".bom-spec")?.value||"",qty:parseInt(row.querySelector(".bom-qty")?.value)||0,material:row.querySelector(".bom-mat")?.value||""});
  });
  const projectStatus=allDone?"已完成":anyActive?"進行中":"待分配";
  try{
    await db.collection("designProjects").doc(id).set({stages,bom,status:projectStatus},{merge:true});
    pushNotif(`設計案件 ${id} 階段已更新`,"success");showToast("已儲存");closeModal();
  }catch(e){showToast("儲存失敗","error");}
}

    <div class="card-title">⏱ 設計案件時間確認表</div>
    ${active.length===0?'<div style="text-align:center;color:var(--muted);padding:20px">無進行中案件</div>':""}
    <div style="overflow-x:auto">${active.length>0?`<table style="width:100%;font-size:11px;border-collapse:collapse">
      <tr style="color:var(--muted);border-bottom:1px solid var(--border2)">
        <th style="padding:6px;text-align:left;white-space:nowrap">案件</th>
        <th style="padding:6px;text-align:left">客戶</th>
        <th style="padding:6px">設計師</th>
        <th style="padding:6px">截止</th>

        <th style="padding:6px">實際</th>

      </tr>
      ${active.map(p=>{
        const stages=p.stages||{};
        const totalEst=DSG_STAGES.reduce((s,st)=>s+(stages[st.id]?.estHours||0),0);
        const totalAct=DSG_STAGES.reduce((s,st)=>s+(stages[st.id]?.actHours||0),0);
        const done=DSG_STAGES.filter(s=>stages[s.id]?.status==="完成").length;
        const pct=Math.round(done/DSG_STAGES.length*100);
        const deadlineD=p.deadline?daysLeft(p.deadline):999;

          <td style="padding:6px;font-weight:600;white-space:nowrap"><span class="wo-tag" style="font-size:9px">${p.id}</span> ${esc(p.projectName).slice(0,10)}</td>

          <td style="padding:6px;text-align:center;color:${deadlineD<0?"#EF4444":deadlineD<3?"#F59E0B":"var(--muted)"}">${p.deadline||"—"}</td>
          ${DSG_STAGES.map(st=>{const ss=stages[st.id];const bg=ss?.status==="完成"?st.color+"44":ss?.status==="進行中"?"#F59E0B44":"transparent";return `<td style="padding:6px;text-align:center;background:${bg};border-radius:4px"><span style="font-size:10px">${ss?.actHours||0}h</span></td>`;}).join("")}

          <td style="padding:6px;text-align:center"><div class="bar-bg" style="height:6px;width:60px;display:inline-block;vertical-align:middle"><div class="bar-fill" style="height:6px;width:${pct}%;background:#3B82F6"></div></div> ${pct}%</td>
        </tr>`;
      }).join("")}

// ─── 設計統計報表 ───────────────────────────────────────────
function renderDesignReport(){
  const all=state.designProjects;
  const byDesigner={};
  all.forEach(p=>{
    const d=p.designer||"未指派";
    if(!byDesigner[d])byDesigner[d]={count:0,done:0,totalEst:0,totalAct:0};
    byDesigner[d].count++;
    if(p.status==="已完成")byDesigner[d].done++;
    const stages=p.stages||{};
    DSG_STAGES.forEach(st=>{
      byDesigner[d].totalEst+=(stages[st.id]?.estHours||0);
      byDesigner[d].totalAct+=(stages[st.id]?.actHours||0);
    });
  });
  const byTool={};all.forEach(p=>{const t=p.tool||"其他";if(!byTool[t])byTool[t]=0;byTool[t]++;});
  const avgByStage={};
  DSG_STAGES.forEach(st=>{
    const completed=all.filter(p=>(p.stages||{})[st.id]?.status==="完成");
    const totalH=completed.reduce((s,p)=>s+((p.stages||{})[st.id]?.actHours||0),0);
    avgByStage[st.id]=completed.length?Math.round(totalH/completed.length*10)/10:0;
  });
  return `
  <div class="card">
    <div class="card-title">👤 設計師工作量統計</div>
    <div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr style="color:var(--muted);border-bottom:1px solid var(--border2)"><th style="padding:8px 6px;text-align:left">設計師</th><th style="padding:8px 6px">總案件</th><th style="padding:8px 6px">已完成</th><th style="padding:8px 6px">預估時數</th><th style="padding:8px 6px">實際時數</th><th style="padding:8px 6px">效率</th></tr>
      ${Object.entries(byDesigner).map(([d,v])=>{
        const eff=v.totalEst>0?Math.round(v.totalEst/v.totalAct*100):0;
        return `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:8px 6px;font-weight:600">${esc(d.split("@")[0])}</td>
          <td style="padding:8px 6px;text-align:center">${v.count}</td>
          <td style="padding:8px 6px;text-align:center;color:#22C55E">${v.done}</td>
          <td style="padding:8px 6px;text-align:center">${v.totalEst}h</td>
          <td style="padding:8px 6px;text-align:center">${v.totalAct}h</td>
          <td style="padding:8px 6px;text-align:center;color:${eff>=100?"#22C55E":"#EF4444"}">${eff}%</td>
        </tr>`;
      }).join("")}
    </table></div>
  </div>
  <div class="card">
    <div class="card-title">📐 各階段平均耗時</div>
    ${DSG_STAGES.map(st=>{
      const avg=avgByStage[st.id];
      const maxW=Math.max(...Object.values(avgByStage),1);
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="min-width:70px;font-size:12px">${st.icon} ${st.label}</span>
        <div class="bar-bg" style="flex:1;height:18px"><div class="bar-fill" style="height:18px;width:${avg/maxW*100}%;background:${st.color};border-radius:4px;display:flex;align-items:center;padding-left:6px"><span style="font-size:10px;font-weight:700;color:#fff">${avg}h</span></div></div>
      </div>`;
    }).join("")}
  </div>
  <div class="card">
    <div class="card-title">🛠 設計工具使用統計</div>
    ${Object.entries(byTool).map(([t,c])=>`<div class="row-item"><span style="font-weight:600">${esc(t)}</span><span style="color:#3B82F6;font-weight:700">${c} 案</span></div>`).join("")}
  </div>`;
}

function addBomEditRow(){
  const list=$("bom-edit-list");if(!list)return;
  const div=document.createElement("div");
  div.innerHTML=bomEditRow({},list.children.length);
  list.appendChild(div.firstElementChild);
}
async function handleBomItemPhoto(input){
  const file=input.files[0];if(!file)return;
  try{
    const dataUrl=await compressImage(file,400,0.5);
    const row=input.closest(".bom-edit-row");
    const preview=row.querySelector(".bom-e-photo-preview");
    const hidden=row.querySelector(".bom-e-photo");
    if(preview.tagName==="IMG"){preview.src=dataUrl;}
    else{const img=document.createElement("img");img.src=dataUrl;img.style.cssText="width:50px;height:50px;object-fit:cover;border-radius:6px";img.className="bom-e-photo-preview";preview.replaceWith(img);}
    hidden.value=dataUrl;
  }catch(e){showToast("圖片處理失敗","error");}
}
function collectBomEditData(){
  const rows=document.querySelectorAll(".bom-edit-row");
  const bom=[];
  rows.forEach(row=>{
    const name=row.querySelector(".bom-e-name")?.value||"";
    if(!name)return;
    bom.push({
      name,
      spec:row.querySelector(".bom-e-spec")?.value||"",
      qty:parseInt(row.querySelector(".bom-e-qty")?.value)||0,
      material:row.querySelector(".bom-e-mat")?.value||"",
      unit:row.querySelector(".bom-e-unit")?.value||"件",
      note:row.querySelector(".bom-e-note")?.value||"",
      photo:row.querySelector(".bom-e-photo")?.value||""
    });
  });
  return bom;
}

let ocrTargetProject="";
let ocrMode="drawing"; // drawing|table|titleblock
// 影像前處理：增強對比、銳化、二值化（提升OCR辨識率）
function preprocessImage(imgSrc,mode){
  return new Promise((resolve,reject)=>{
    const img=new Image();img.crossOrigin="anonymous";
    img.onload=()=>{
      const cv=document.createElement("canvas");const ctx=cv.getContext("2d");
      // 高解析度
      const maxW=2000,maxH=2000;
      let w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW;}
      if(h>maxH){w=w*(maxH/h);h=maxH;}
      cv.width=w;cv.height=h;
      ctx.drawImage(img,0,0,w,h);
      const imageData=ctx.getImageData(0,0,w,h);
      const d=imageData.data;
      // Step1: 灰階
      for(let i=0;i<d.length;i+=4){
        const gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        d[i]=d[i+1]=d[i+2]=gray;
      }
      // Step2: 對比增強 (CLAHE-like簡化版)
      let min=255,max=0;
      for(let i=0;i<d.length;i+=4){if(d[i]<min)min=d[i];if(d[i]>max)max=d[i];}
      const range=max-min||1;
      for(let i=0;i<d.length;i+=4){
        let v=((d[i]-min)/range)*255;
        // 額外拉大對比
        v=v<128?v*0.7:128+(v-128)*1.3;
        v=Math.max(0,Math.min(255,v));
        d[i]=d[i+1]=d[i+2]=v;
      }
      // Step3: 自適應二值化 (適合工程圖面)
      if(mode==="drawing"||mode==="titleblock"){
        const blockSize=15;
        const C=10;
        const gray=new Uint8Array(w*h);
        for(let i=0;i<gray.length;i++)gray[i]=d[i*4];
        // 積分影像
        const integral=new Float64Array(w*h);
        for(let y=0;y<h;y++){
          let rowSum=0;
          for(let x=0;x<w;x++){
            rowSum+=gray[y*w+x];
            integral[y*w+x]=rowSum+(y>0?integral[(y-1)*w+x]:0);
          }
        }
        for(let y=0;y<h;y++){
          for(let x=0;x<w;x++){
            const half=Math.floor(blockSize/2);
            const x1=Math.max(0,x-half),y1=Math.max(0,y-half);
            const x2=Math.min(w-1,x+half),y2=Math.min(h-1,y+half);
            const count=(x2-x1+1)*(y2-y1+1);
            let sum=integral[y2*w+x2];
            if(x1>0)sum-=integral[y2*w+(x1-1)];
            if(y1>0)sum-=integral[(y1-1)*w+x2];
            if(x1>0&&y1>0)sum+=integral[(y1-1)*w+(x1-1)];
            const threshold=sum/count-C;
            const idx=(y*w+x)*4;
            const val=gray[y*w+x]<threshold?0:255;
            d[idx]=d[idx+1]=d[idx+2]=val;
          }
        }
      }
      // Step4: 反色檢測 (若白色佔少數，代表可能是深色底圖)
      let whiteCount=0;
      for(let i=0;i<d.length;i+=4){if(d[i]>200)whiteCount++;}
      if(whiteCount<d.length/4*0.3){
        for(let i=0;i<d.length;i+=4){d[i]=255-d[i];d[i+1]=255-d[i+1];d[i+2]=255-d[i+2];}
      }
      ctx.putImageData(imageData,0,0);
      resolve(cv.toDataURL("image/png",1.0));
    };
    img.onerror=()=>reject(new Error("圖片載入失敗"));
    img.src=imgSrc;
  });
}

function setOcrMode(mode){
  ocrMode=mode;
  document.querySelectorAll("[id^=ocr-mode-]").forEach(b=>{if(b.id.startsWith("ocr-mode-")&&b.id!=="ocr-mode-desc")b.classList.remove("on");});
  const btn=$("ocr-mode-"+mode);if(btn)btn.classList.add("on");
  const descs={
    drawing:"📐 從工程圖面PDF抓取零件名稱、材質標註、尺寸規格、數量等細項",
    titleblock:"📋 擷取圖面標題欄：圖號、名稱、材質、版次、比例等",
    table:"📊 辨識BOM表格、零件清單、材料明細表等表格格式"
  };
  const el=$("ocr-mode-desc");if(el)el.innerHTML=descs[mode]||"";
}

function setOcrLang(lang){
  $("ocr-lang").value=lang;
  document.querySelectorAll("[id^=ocr-lang-]").forEach(b=>b.classList.remove("on"));
  if(lang.includes("chi"))$("ocr-lang-chi").classList.add("on");
  else $("ocr-lang-eng").classList.add("on");
}

// ─── PDF 上傳處理 ──────────────────────────────────────────
async function handlePdfUpload(input){
  const file=input.files[0];if(!file)return;
  if(!file.name.toLowerCase().endsWith(".pdf")){showToast("請上傳 PDF 檔案","error");return;}
  showToast("載入 PDF 中...");
  $("ocr-file-type").value="pdf";
  pdfPageImages=[];

  try{
    const arrayBuf=await file.arrayBuffer();
    pdfFileData=arrayBuf;

    if(!window.pdfjsLib){showToast("PDF.js 尚未載入，請稍候重試","error");return;}
    const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
    const totalPages=pdf.numPages;

    $("ocr-file-info").textContent=`📄 ${esc(file.name)} — ${totalPages} 頁`;
    $("ocr-preview").style.display="block";

    // 渲染每頁為圖片
    const previewScroll=$("ocr-preview-scroll");
    previewScroll.innerHTML="";
    for(let i=1;i<=Math.min(totalPages,20);i++){
      const page=await pdf.getPage(i);
      const scale=2.0; // 高解析度渲染
      const viewport=page.getViewport({scale});
      const canvas=document.createElement("canvas");
      canvas.width=viewport.width;canvas.height=viewport.height;
      const ctx=canvas.getContext("2d");
      await page.render({canvasContext:ctx,viewport}).promise;
      const dataUrl=canvas.toDataURL("image/png",0.95);
      pdfPageImages.push(dataUrl);

      // 顯示預覽
      const pageDiv=document.createElement("div");
      pageDiv.style.cssText="margin-bottom:8px;position:relative";
      pageDiv.innerHTML=`<div style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:4px;font-size:10px">第 ${i} 頁</div><img src="${dataUrl}" style="max-width:100%;border-radius:4px;border:1px solid var(--border2)">`;
      previewScroll.appendChild(pageDiv);
    }

    if(totalPages>20){
      previewScroll.innerHTML+=`<div style="text-align:center;color:var(--muted);font-size:12px;padding:10px">僅顯示前 20 頁</div>`;
    }

    const pageNav=$("ocr-page-nav");
    pageNav.style.display="block";
    pageNav.textContent=`共 ${totalPages} 頁，已載入 ${Math.min(totalPages,20)} 頁`;

    showToast(`PDF 已載入 (${totalPages}頁)，點擊開始分析`);
  }catch(e){
    console.error("PDF載入失敗:",e);
    showToast("PDF 載入失敗："+e.message,"error");
  }
}

// ─── 圖片上傳處理 ──────────────────────────────────────────
async function handleImageUpload(input){
  const file=input.files[0];if(!file)return;
  showToast("處理圖片中...");
  $("ocr-file-type").value="image";
  pdfPageImages=[];pdfFileData=null;
  try{
    const dataUrl=await compressImage(file,2000,0.9);
    $("ocr-image-data").value=dataUrl;
    $("ocr-preview").style.display="block";
    $("ocr-file-info").textContent=`🖼️ ${esc(file.name)}`;
    $("ocr-page-nav").style.display="none";
    const previewScroll=$("ocr-preview-scroll");
    previewScroll.innerHTML=`<img id="ocr-preview-img" src="${dataUrl}" style="max-width:100%;border-radius:4px">`;

    showToast("圖片已載入，點擊開始分析");
  }catch(e){showToast("圖片處理失敗","error");}
}

// ─── 主分析流程 ──────────────────────────────────────────
async function startAnalysis(){
  const fileType=$("ocr-file-type")?.value;
  if(fileType==="pdf"){
    await startPdfAnalysis();
  }else if(fileType==="image"){
    await startImageOcr();
  }else{
    showToast("請先上傳 PDF 或圖片檔案","error");
  }
}

// ─── PDF 文字直接擷取（最精確）──────────────────────────────
async function startPdfAnalysis(){
  if(!pdfFileData){showToast("請先上傳 PDF","error");return;}
  $("ocr-progress").style.display="block";
  $("ocr-result").style.display="none";
  $("ocr-parsed").style.display="none";
  $("ocr-start-btn").disabled=true;
  $("ocr-start-btn").textContent="分析中...";
  $("ocr-status-text").textContent="讀取 PDF 文字層...";
  $("ocr-bar").style.width="10%";

  try{
    const pdf=await pdfjsLib.getDocument({data:pdfFileData}).promise;
    const totalPages=pdf.numPages;
    let allText="";

    // Step1: 嘗試直接擷取文字層
    for(let i=1;i<=Math.min(totalPages,20);i++){
      const page=await pdf.getPage(i);
      const textContent=await page.getTextContent();
      const pageText=extractTextFromPdfPage(textContent);
      if(pageText.trim()){
        allText+=(totalPages>1?`\n===== 第 ${i} 頁 =====\n`:"")+pageText;
      }
      const pct=Math.round((i/Math.min(totalPages,20))*60);
      $("ocr-bar").style.width=pct+"%";
      $("ocr-status-text").textContent=`讀取第 ${i}/${Math.min(totalPages,20)} 頁...`;
    }

    // 判斷是否為掃描PDF（文字極少）
    const cleanText=allText.replace(/\s+/g,"");
    if(cleanText.length<20){
      // 掃描PDF → 用OCR辨識渲染後的圖片
      $("ocr-status-text").textContent="偵測為掃描PDF，啟動 OCR 辨識...";
      $("ocr-bar").style.width="65%";
      allText=await ocrPdfPages();
    }

    $("ocr-text").value=allText;
    $("ocr-result").style.display="block";
    $("ocr-status-text").textContent="✅ PDF 分析完成！";
    $("ocr-bar").style.width="100%";

    showToast("分析完成，自動解析中...");
    setTimeout(()=>parseDrawingToBom(),300);
  }catch(e){
    console.error("PDF分析失敗:",e);
    $("ocr-status-text").textContent="❌ 分析失敗";
    showToast("PDF 分析失敗："+e.message,"error");
  }
  $("ocr-start-btn").disabled=false;
  $("ocr-start-btn").textContent="🔍 重新分析";
}

// 從 PDF.js textContent 擷取結構化文字
function extractTextFromPdfPage(textContent){
  if(!textContent||!textContent.items||textContent.items.length===0)return"";
  // 按 Y 座標分行，再按 X 座標排序
  const items=textContent.items.filter(it=>it.str&&it.str.trim());
  if(items.length===0)return"";

  // 群組化為行（Y座標接近的視為同一行）
  const lineThreshold=5;
  const lines=[];
  let currentLine=[];
  let lastY=null;

  // 先按Y降序（PDF座標從底部開始），再按X升序
  const sorted=[...items].sort((a,b)=>{
    const ya=a.transform?a.transform[5]:0;
    const yb=b.transform?b.transform[5]:0;
    if(Math.abs(ya-yb)>lineThreshold)return yb-ya; // Y降序
    const xa=a.transform?a.transform[4]:0;
    const xb=b.transform?b.transform[4]:0;
    return xa-xb; // X升序
  });

  sorted.forEach(item=>{
    const y=item.transform?item.transform[5]:0;
    if(lastY===null||Math.abs(y-lastY)>lineThreshold){
      if(currentLine.length)lines.push(currentLine);
      currentLine=[item];
      lastY=y;
    }else{
      currentLine.push(item);
    }
  });
  if(currentLine.length)lines.push(currentLine);

  // 組合每行文字，用合理的間距分隔
  return lines.map(line=>{
    line.sort((a,b)=>(a.transform?a.transform[4]:0)-(b.transform?b.transform[4]:0));
    let result="";
    let lastEndX=0;
    line.forEach(item=>{
      const x=item.transform?item.transform[4]:0;
      const gap=x-lastEndX;
      if(result&&gap>15)result+="\t"; // 大間距用tab
      else if(result&&gap>5)result+=" "; // 小間距用空格
      result+=item.str;
      lastEndX=x+(item.width||item.str.length*6);
    });
    return result;
  }).join("\n");
}

// 掃描PDF → OCR 辨識
async function ocrPdfPages(){
  if(pdfPageImages.length===0){showToast("無可辨識的頁面","error");return"";}
  const lang=$("ocr-lang")?.value||"chi_tra+eng";
  let allText="";

  try{
    const worker=await Tesseract.createWorker(lang,1,{
      logger:m=>{
        if(m.status==="recognizing text"){
          const pct=65+Math.round((m.progress||0)*30);
          $("ocr-bar").style.width=pct+"%";
        }
      }
    });

    for(let i=0;i<Math.min(pdfPageImages.length,10);i++){
      $("ocr-status-text").textContent=`OCR 辨識第 ${i+1}/${Math.min(pdfPageImages.length,10)} 頁...`;
      // 前處理增強
      const processed=await preprocessImage(pdfPageImages[i],ocrMode);
      const result=await worker.recognize(processed);
      if(result.data.text.trim()){
        allText+=(pdfPageImages.length>1?`\n===== 第 ${i+1} 頁 =====\n`:"")+result.data.text;
      }
    }
    await worker.terminate();
  }catch(e){
    console.error("OCR失敗:",e);
    showToast("OCR辨識失敗","error");
  }
  return allText;
}

// ─── 圖片 OCR 辨識 ──────────────────────────────────────────
async function startImageOcr(){
  const processed=$("ocr-image-processed")?.value;
  const raw=$("ocr-image-data")?.value;
  if(!raw){showToast("請先上傳圖片","error");return;}
  const imageData=processed||raw;
  const lang=$("ocr-lang")?.value||"chi_tra+eng";
  $("ocr-progress").style.display="block";
  $("ocr-result").style.display="none";
  $("ocr-parsed").style.display="none";
  $("ocr-start-btn").disabled=true;
  $("ocr-start-btn").textContent="辨識中...";

  try{
    const worker=await Tesseract.createWorker(lang,1,{
      logger:m=>{
        if(m.status==="recognizing text"){
          const pct=Math.round((m.progress||0)*100);
          $("ocr-bar").style.width=pct+"%";
          $("ocr-status-text").textContent=`辨識中... ${pct}%`;
        }else{
          $("ocr-status-text").textContent=m.status||"處理中...";
        }
      }
    });
    const result=await worker.recognize(imageData);
    await worker.terminate();
    $("ocr-text").value=result.data.text;
    $("ocr-result").style.display="block";
    $("ocr-status-text").textContent="✅ 辨識完成！";
    $("ocr-bar").style.width="100%";
    showToast("辨識完成，自動解析中...");
    setTimeout(()=>parseDrawingToBom(),300);
  }catch(e){
    console.error("OCR失敗:",e);
    $("ocr-status-text").textContent="❌ 辨識失敗";
    showToast("辨識失敗，請重試","error");
  }
  $("ocr-start-btn").disabled=false;
  $("ocr-start-btn").textContent="🔍 重新分析";
}

// ─── 智慧圖面解析引擎 ──────────────────────────────────────
const DRAW_MAT_KEYWORDS=["SS","SUS","SUS304","SUS316","SUS430","SPCC","SPHC","SGCC","SECC","AL","A6063","A5052","A6061","S45C","SCM","SCM440","SK","SS400","S50C","SM490","ASTM","AISI","JIS","EN","DIN","Q235","Q345",
  "鋁","鋁板","鋁管","不鏽鋼","白鐵","鐵板","鍍鋅","銅","碳鋼","鋼板","板材","圓管","方管","角鐵","扁鐵","C型鋼","H型鋼","I型鋼","槽鋼","鍍鋅板","花紋板","力骨","補強板","蓋板","底板","側板","面板","背板","隔板","腳座","支架","把手","鉸鏈"];
const DRAW_DIM_REGEX=/(\d+(?:\.\d+)?)\s*[×xX*]\s*(\d+(?:\.\d+)?)(?:\s*[×xX*]\s*(\d+(?:\.\d+)?))?/;
const DRAW_THICK_REGEX=/[tT]\s*[=＝:：]?\s*(\d+(?:\.\d+)?)|(\d+(?:\.\d+)?)\s*[tT](?:\s|$|mm)/;
const DRAW_DIA_REGEX=/[ΦφΦ⌀]\s*(\d+(?:\.\d+)?)/;
const DRAW_QTY_REGEX=/(?:數量|QTY|qty|Qty|pcs|PCS|Pcs|組|個|片|支|入)[：:=\s]*(\d+)|(\d+)\s*(?:pcs|PCS|組|個|片|支|入)|[×xX]\s*(\d+)\s*$/;
const DRAW_PN_REGEX=/(?:件號|PART\s*(?:NO|#)|P\/N|品號|圖號|ITEM|Item|No\.?)[：:.\s-]*([A-Za-z0-9\-_.]+)/i;

function parseDrawingToBom(){
  const text=$("ocr-text")?.value||"";
  if(!text.trim()){showToast("無辨識文字","error");return;}

  let parsed=[];

  if(ocrMode==="titleblock"){
    parsed=parseTitleBlock(text);
  }else if(ocrMode==="table"){
    parsed=parseTableBom(text);
  }else{
    // drawing mode: 全方位解析
    parsed=parseDrawingContent(text);
  }

  // 去重（名稱+規格完全相同的合併數量）
  const deduped=[];
  parsed.forEach(item=>{
    const exist=deduped.find(x=>x.name===item.name&&x.spec===item.spec&&x.material===item.material);
    if(exist){exist.qty+=item.qty||1;}
    else{deduped.push({...item});}
  });

  if(deduped.length===0){
    showToast("無法解析項目，請嘗試手動編輯辨識文字或切換辨識模式","error");
    return;
  }

  $("ocr-parsed").style.display="block";
  $("ocr-parsed-list").innerHTML=`

        <td style="padding:6px">${i+1}</td>

        <td style="padding:6px"><input class="inp ocr-b-spec" value="${esc(b.spec)}" style="font-size:11px;width:90px"></td>
        <td style="padding:6px"><input class="inp ocr-b-qty" type="number" value="${b.qty}" style="font-size:11px;width:50px;text-align:center"></td>
        <td style="padding:6px"><input class="inp ocr-b-mat" value="${esc(b.material)}" style="font-size:11px;width:80px"></td>
        <td style="padding:6px"><input class="inp ocr-b-note" value="${esc(b.note||"")}" style="font-size:11px"></td>
        <td style="padding:6px;text-align:center"><button class="icon-btn" style="color:#EF4444" onclick="this.closest('tr').remove()">✕</button></td>
      </tr>`).join("")}
    </table></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">

      <button class="icon-btn" style="color:#3B82F6;font-size:11px" onclick="addOcrParsedRow()">＋ 手動新增</button>
    </div>`;
  showToast(`成功解析 ${deduped.length} 項`);
}

// ─── 圖面內容解析（Drawing Mode）──────────────────────────
function parseDrawingContent(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l.length>1);
  const items=[];
  // Pass1: 逐行擷取零件資訊
  const skipPatterns=/^(SCALE|scale|比例|日期|DATE|REV|版次|DRAWN|CHECKED|APPROVED|審核|核准|繪圖|公差|TOLERANCE|MATERIAL|角法|ANGLE|PROJECTION|FINISH|SHEET|DO NOT|UNLESS|DIMENSIONS|ALL DIMS|GENERAL|NOTES|NOTE|注意|TITLE|DESCRIPTION|DWG|WEIGHT|重量|PAGE|頁|共|OF|第三角|投影)/i;
  const headerPatterns=/^(序號|品名|名稱|項次|#|NO\.?|no\.?|ITEM|材質|數量|規格|單位|備註|QTY|PART|DESCRIPTION|MATERIAL|SIZE|UNIT|REMARK)/i;

  lines.forEach(line=>{
    if(skipPatterns.test(line))return;
    if(headerPatterns.test(line)&&line.length<20)return;
    if(line.length<2)return;

    const item={name:"",spec:"",qty:1,material:"",note:""};

    // 嘗試抓材質
    let foundMat="";
    DRAW_MAT_KEYWORDS.forEach(kw=>{
      const kwUpper=kw.toUpperCase();
      const lineUpper=line.toUpperCase();
      if(lineUpper.includes(kwUpper)){
        // 抓取完整材質描述
        const idx=lineUpper.indexOf(kwUpper);
        let matStr=line.substring(idx);
        // 往後取到非材質字元為止
        const matEnd=matStr.search(/[\s,，、;；\)）\]】]/);
        if(matEnd>0)matStr=matStr.substring(0,matEnd);
        if(matStr.length>foundMat.length)foundMat=matStr;
      }
    });
    item.material=foundMat;

    // 嘗試抓尺寸規格
    const dimMatch=line.match(DRAW_DIM_REGEX);
    const thickMatch=line.match(DRAW_THICK_REGEX);
    const diaMatch=line.match(DRAW_DIA_REGEX);
    let specs=[];
    if(dimMatch){
      specs.push(dimMatch[3]?`${dimMatch[1]}×${dimMatch[2]}×${dimMatch[3]}`:`${dimMatch[1]}×${dimMatch[2]}`);
    }
    if(thickMatch){
      const tv=thickMatch[1]||thickMatch[2];
      if(!dimMatch||!dimMatch[0].includes(tv))specs.push("t="+tv);
    }
    if(diaMatch)specs.push("Φ"+diaMatch[1]);
    item.spec=specs.join(" ");

    // 嘗試抓數量
    const qtyMatch=line.match(DRAW_QTY_REGEX);
    if(qtyMatch)item.qty=parseInt(qtyMatch[1]||qtyMatch[2]||qtyMatch[3])||1;

    // 嘗試抓件號/品名
    const pnMatch=line.match(DRAW_PN_REGEX);
    if(pnMatch){
      item.note="件號:"+pnMatch[1];
    }

    // 清理後的文字作為品名
    let cleanLine=line;
    // 移除已擷取的部分
    if(dimMatch)cleanLine=cleanLine.replace(dimMatch[0],"");
    if(thickMatch)cleanLine=cleanLine.replace(thickMatch[0],"");
    if(diaMatch)cleanLine=cleanLine.replace(diaMatch[0],"");
    if(qtyMatch)cleanLine=cleanLine.replace(qtyMatch[0],"");
    if(foundMat)cleanLine=cleanLine.replace(foundMat,"");
    if(pnMatch)cleanLine=cleanLine.replace(pnMatch[0],"");
    // 移除純數字序號
    cleanLine=cleanLine.replace(/^\d+[\.\)\]\s]+/,"");
    // 移除多餘符號
    cleanLine=cleanLine.replace(/[：:=＝\-—\|│,，、;；\(\)（）\[\]【】\{\}]/g," ").replace(/\s+/g," ").trim();

    // 判斷是否有意義
    if(cleanLine.length>=1){
      item.name=cleanLine;
    }else if(item.spec||item.material){
      item.name=item.material||item.spec||"未命名零件";
    }

    // 只有有品名或有規格+材質才加入
    if(item.name&&(item.name.length>=1||item.spec||item.material)){
      items.push(item);
    }
  });

  // Pass2: 嘗試表格式解析（如果有明顯的表格結構）
  const tableItems=parseTableBom(text);
  if(tableItems.length>items.length)return tableItems;

  return items;
}

// ─── 標題欄擷取 ──────────────────────────────────────────
function parseTitleBlock(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);
  const info={name:"",partNo:"",material:"",scale:"",rev:"",customer:"",weight:"",note:""};

  lines.forEach(line=>{
    const lower=line.toLowerCase();
    // 圖號
    if(/(?:圖號|DWG|DRAWING|D\/N|PART\s*NO|P\/N)/i.test(line)){
      const v=line.replace(/.*(?:圖號|DWG|DRAWING|D\/N|PART\s*NO|P\/N)[：:.\s\-]*/i,"").trim();
      if(v)info.partNo=v;
    }
    // 品名/名稱
    else if(/(?:品名|名稱|TITLE|NAME|DESCRIPTION|DESC)/i.test(line)){
      const v=line.replace(/.*(?:品名|名稱|TITLE|NAME|DESCRIPTION|DESC)[：:.\s\-]*/i,"").trim();
      if(v)info.name=v;
    }
    // 材質
    else if(/(?:材質|MATERIAL|MAT'?L|材料)/i.test(line)){
      const v=line.replace(/.*(?:材質|MATERIAL|MAT'?L|材料)[：:.\s\-]*/i,"").trim();
      if(v)info.material=v;
    }
    // 比例
    else if(/(?:比例|SCALE)/i.test(line)){
      const v=line.replace(/.*(?:比例|SCALE)[：:.\s\-]*/i,"").trim();
      if(v)info.scale=v;
    }
    // 版次
    else if(/(?:版次|REV|REVISION|版本)/i.test(line)){
      const v=line.replace(/.*(?:版次|REV|REVISION|版本)[：:.\s\-]*/i,"").trim();
      if(v)info.rev=v;
    }
    // 重量
    else if(/(?:重量|WEIGHT|WT)/i.test(line)){
      const v=line.replace(/.*(?:重量|WEIGHT|WT)[：:.\s\-]*/i,"").trim();
      if(v)info.weight=v;
    }
    // 客戶
    else if(/(?:客戶|CUSTOMER|CLIENT)/i.test(line)){
      const v=line.replace(/.*(?:客戶|CUSTOMER|CLIENT)[：:.\s\-]*/i,"").trim();
      if(v)info.customer=v;
    }
    // 用材質關鍵字做 fallback
    else{
      DRAW_MAT_KEYWORDS.forEach(kw=>{
        if(line.toUpperCase().includes(kw.toUpperCase())&&!info.material){
          info.material=line.trim();
        }
      });
    }
  });

  if(!info.name&&!info.partNo)return [];
  const item={
    name:info.name||info.partNo||"標題欄零件",
    spec:"",
    qty:1,
    material:info.material,
    note:[info.partNo?"圖號:"+info.partNo:"",info.rev?"版次:"+info.rev:"",info.scale?"比例:"+info.scale:"",info.weight?"重量:"+info.weight:"",info.customer?"客戶:"+info.customer:""].filter(x=>x).join(" | ")
  };
  return [item];
}

// ─── BOM表格辨識 ──────────────────────────────────────────
function parseTableBom(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l.length>1);
  const parsed=[];

  // 偵測表頭行以決定欄位順序
  let colMap=null;
  const headerKeywords={
    name:/品名|名稱|DESCRIPTION|DESC|PART\s*NAME|零件名|Part\s*Name/i,
    material:/材質|MATERIAL|MAT'?L|材料/i,
    spec:/規格|尺寸|SIZE|SPEC|DIMENSION|DIM/i,
    qty:/數量|QTY|QUANTITY|PCS|入數|需求/i,
    unit:/單位|UNIT/i,
    note:/備註|REMARK|NOTE|說明/i,
    partNo:/件號|序號|ITEM|NO\.?|#|編號|PART\s*NO/i
  };

  lines.forEach((line,lineIdx)=>{
    // 分割
    let parts=line.split(/\t|\|/).map(s=>s.trim()).filter(s=>s);
    if(parts.length<2)parts=line.split(/\s{2,}/).map(s=>s.trim()).filter(s=>s);
    if(parts.length<2)parts=line.split(/\s+/).map(s=>s.trim()).filter(s=>s);

    // 檢查是否為表頭
    if(!colMap){
      let headerHits=0;
      const testMap={};
      parts.forEach((p,ci)=>{
        for(const[key,regex]of Object.entries(headerKeywords)){
          if(regex.test(p)&&!testMap[key]){testMap[key]=ci;headerHits++;break;}
        }
      });
      if(headerHits>=2){
        colMap=testMap;
        return; // 跳過表頭行
      }
    }

    if(parts.length<2)return;
    // 跳過明顯的表頭或說明行
    if(/^(序號|品名|名稱|項次|#|NO|ITEM|材質|數量|規格|單位|備註)/i.test(line)&&line.length<30)return;

    const item={name:"",spec:"",qty:1,material:"",note:""};

    if(colMap){
      // 依偵測到的欄位順序取值
      if(colMap.name!==undefined)item.name=parts[colMap.name]||"";
      if(colMap.material!==undefined)item.material=parts[colMap.material]||"";
      if(colMap.spec!==undefined)item.spec=parts[colMap.spec]||"";
      if(colMap.qty!==undefined)item.qty=parseInt(parts[colMap.qty])||1;
      if(colMap.unit!==undefined)item.unit=parts[colMap.unit]||"件";
      if(colMap.note!==undefined)item.note=parts[colMap.note]||"";
      if(!item.name&&colMap.partNo!==undefined)item.name=parts[colMap.partNo]||"";
    }else{
      // 無表頭，智慧猜測
      let qtyFound=false;
      parts.forEach((part,pi)=>{
        const isNum=/^\d+$/.test(part);
        const hasMat=DRAW_MAT_KEYWORDS.some(k=>part.toUpperCase().includes(k.toUpperCase()));
        const hasDim=DRAW_DIM_REGEX.test(part)||DRAW_THICK_REGEX.test(part)||DRAW_DIA_REGEX.test(part);
        if(isNum&&!qtyFound&&pi>0&&parseInt(part)<9999){item.qty=parseInt(part);qtyFound=true;}
        else if(hasMat&&!item.material){item.material=part;}
        else if(hasDim&&!item.spec){item.spec=part;}
        else if(!item.name){item.name=part;}
        else if(!item.spec&&part.match(/[\d×xX*\-\.]+/)){item.spec=part;}
        else{item.note+=(item.note?" ":"")+part;}
      });
    }
    // 移除名稱中的純數字序號
    item.name=item.name.replace(/^\d+[\.\)\]]\s*/,"").trim();
    if(item.name)parsed.push(item);
  });

  return parsed;
}

async function confirmOcrImport(){
  const projectId=$("ocr-project")?.value||ocrTargetProject;
  if(!projectId){showToast("請選擇匯入的案件","error");return;}
  const rows=document.querySelectorAll(".ocr-bom-row");
  const newBom=[];
  rows.forEach(row=>{
    const name=row.querySelector(".ocr-b-name")?.value||"";
    if(!name)return;
    newBom.push({name,spec:row.querySelector(".ocr-b-spec")?.value||"",qty:parseInt(row.querySelector(".ocr-b-qty")?.value)||1,material:row.querySelector(".ocr-b-mat")?.value||"",unit:"件",note:row.querySelector(".ocr-b-note")?.value||"",photo:""});
  });
  if(newBom.length===0){showToast("沒有可匯入的項目","error");return;}
  const p=state.designProjects.find(x=>x.id===projectId);
  const existingBom=p?.bom||[];
  const mergedBom=existingBom.concat(newBom);
  try{
    await db.collection("designProjects").doc(projectId).set({bom:mergedBom},{merge:true});
    pushNotif(`${projectId} BOM 已匯入 ${newBom.length} 項`,"success");
    showToast(`成功匯入 ${newBom.length} 項至 ${projectId}`);
    closeModal();
  }catch(e){showToast("匯入失敗","error");}
}

function advanceToStage(id,sid){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const ns=sid, isShip=ns==="shipping";
  const msg=isShip?LT.shipping(o):LT.stageAdvance(o,ns);
  sendLine(msg,o.customer,id);
  pushNotif(`${id} 移至「${stg(ns)?.label}」`,"advance");
  db.collection("orders").doc(id).update({stage:ns,status:isShip?"完成":"進行中"})
    .catch(e=>console.error("更新工單失敗:",e));
}

function doSendLine(){
  const lt=state.lineType;
  const lo=state.orders.find(x=>x.id===state.lineOrderId)||state.orders[0];
  const lq=state.quotes.find(x=>x.id===state.lineQuoteId)||state.quotes[0];
  let msg="",to="";
  if(lt==="stageAdvance"&&lo){const si=stgIdx(lo.stage);const ns=STAGE_IDS[Math.min(si+1,STAGES.length-1)];msg=LT.stageAdvance(lo,ns);to=lo.customer;}
  else if(lt==="delay"&&lo){msg=LT.delay(lo);to=lo.customer;}
  else if(lt==="quoteReady"&&lq){msg=LT.quoteReady(lq);to=lq.customer;}
  else if(lt==="shipping"&&lo){msg=LT.shipping(lo);to=lo.customer;}
  else if(lt==="custom"){msg=state.lineCustomMsg;to=state.lineCustomTo||"客戶";}
  if(!msg.trim()){showToast("訊息不可空白","error");return;}
  sendLine(msg,to);
  render();
}

  <div class="sec-title">加工製程</div><div style="margin-top:6px">${procs||"—"}</div>
  ${q.note?`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px;font-size:12px;color:#92400e;margin-top:14px">📌 備註：${q.note}</div>`:""}
  <div class="validity">✅ 本報價單有效期限自建立日起 ${q.validDays} 天。如需確認訂單，請回覆 LINE 或來電洽詢。</div>
  <div class="footer"><div>MetalFlow 系統自動產生</div><div>列印日期：${new Date().toLocaleDateString("zh-TW")}</div></div>
  <br><div class="no-print" style="text-align:center;margin-top:20px"><button onclick="window.print()" style="background:#1a56db;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:700">🖨 列印 / 儲存PDF</button></div>
  </body></html>`;
  const w=window.open("","_blank");
  if(w){w.document.write(html);w.document.close();}else showToast("請允許彈出視窗","error");
}
function openViewModal(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const si=stgIdx(o.stage), s=stg(o.stage), pct=Math.round(si/(STAGES.length-1)*100);
  $("modal-box").innerHTML=`
    <div class="modal-head"><div class="modal-title">${o.id} 工單詳情</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div style="background:#0F172A;border-radius:10px;padding:12px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:${s.color};font-weight:700">${s.icon} ${s.label}</span>
        <span style="font-size:13px;color:#10B981;font-weight:700">${pct}%</span>
      </div>
      <div class="bar-bg" style="height:8px"><div class="bar-fill" style="height:8px;width:${pct}%;background:linear-gradient(90deg,#3B82F6,${s.color})"></div></div>
    </div>
    ${[["工單號",o.id],["客戶",o.customer],["品名",o.part],["數量",`${o.qty} 件`],["材質",o.material],["產業",o.industry],["截止日期",o.deadline],["金額",o.amount>0?`NT$ ${o.amount.toLocaleString()}`:"未定"],["狀態",o.status],["優先",o.priority],["備註",o.note||"—"]].map(([k,v])=>`<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${esc(v)}</span></div>`).join("")}
    ${renderPhotos(o.photos)}
    <div style="display:flex;gap:10px;margin-top:14px">
      ${currentUserRole!=="floor"?`<button style="background:#3B82F6;color:#fff;border:none;border-radius:10px;padding:11px;flex:1;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit" onclick="closeModal();openEditOrderModal('${o.id}')">✏️ 編輯工單</button>`:""}
      <button style="background:#06C755;color:#fff;border:none;border-radius:10px;padding:11px;flex:1;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit" onclick="sendCurrentOrderLine('${o.id}');closeModal()">📱 通知客戶</button>
    </div>
    <button class="icon-btn" style="width:100%;padding:10px;margin-top:8px;text-align:center" onclick="closeModal()">關閉</button>`;
  $("modal-wrap").classList.add("show");
}
function sendCurrentOrderLine(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  sendLine(LT.stageAdvance(o,o.stage),o.customer,id);
  render();
}
function openNewOrderModal(){
  const f=state.newOrderForm;
  $("modal-box").innerHTML=`
    <div class="modal-head"><div class="modal-title">新建工單</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div><label class="lbl">客戶名稱*</label><input class="inp" id="nof-customer" value="${esc(f.customer)}"></div>
      <div><label class="lbl">品名*</label><input class="inp" id="nof-part" value="${esc(f.part)}"></div>
      <div><label class="lbl">數量*</label><input class="inp" type="number" id="nof-qty" value="${f.qty}"></div>
      <div><label class="lbl">材質</label><input class="inp" id="nof-material" value="${esc(f.material)}"></div>
      <div><label class="lbl">截止日期</label><input class="inp" type="date" id="nof-deadline" value="${f.deadline}"></div>
      <div><label class="lbl">金額(NT$)</label><input class="inp" type="number" id="nof-amount" value="${f.amount}"></div>
    </div>
    <div class="form-grid">
      <div><label class="lbl">產業</label><select class="inp" id="nof-industry">${["機械設備","半導體設備","自動化設備","重電","客製板金"].map(x=>`<option${f.industry===x?" selected":""}>${x}</option>`).join("")}</select></div>
      <div><label class="lbl">優先</label><select class="inp" id="nof-priority">${["高","中","低"].map(x=>`<option${f.priority===x?" selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div class="form-grid">
      <div><label class="lbl">起始站點</label><select class="inp" id="nof-stage">${STAGES.map(s=>`<option value="${s.id}"${f.stage===s.id?" selected":""}>${s.label}</option>`).join("")}</select></div>
    </div>
    <div style="margin-bottom:14px"><label class="lbl">備註</label><input class="inp" id="nof-note" value="${esc(f.note)}"></div>
    ${photoInput("nof-photos")}
    <div style="display:flex;gap:10px">
      <button class="accent-btn" style="flex:1;padding:11px" onclick="submitNewOrder()">建立工單</button>
      <button class="icon-btn" style="flex:1;padding:11px;text-align:center" onclick="closeModal()">取消</button>
    </div>`;
  $("modal-wrap").classList.add("show");
}
async function submitNewOrder(){
  const g=id=>$(id)?.value||"";
  const customer=g("nof-customer"), part=g("nof-part"), qty=g("nof-qty");
  if(!customer||!part||!qty){showToast("請填必填欄位","error");return;}
  const wId=`WO-${String(state.orderWoCount++).padStart(4,"0")}`;
  const photos=JSON.parse(g("nof-photos")||"[]");
  const nw={customer,part,qty:parseInt(qty),material:g("nof-material"),stage:g("nof-stage"),priority:g("nof-priority"),deadline:g("nof-deadline"),amount:parseFloat(g("nof-amount"))||0,note:g("nof-note"),industry:g("nof-industry"),photos,status:"待處理",created:firebase.firestore.Timestamp.now(),createdBy:currentUser.uid};
  try{
    await db.collection("orders").doc(wId).set(nw);
    pushNotif(`新工單 ${wId} 已建立`,"success");
    showToast("新工單已建立");
    closeModal();
  }catch(e){
    console.error("建立工單失敗:",e);
    showToast("建立工單失敗","error");
  }
}
function openEditOrderModal(id){
  const o=state.orders.find(x=>x.id===id); if(!o)return;
  const statusOpts=["待處理","進行中","延誤","完成"];
  const industryOpts=["機械設備","半導體設備","自動化設備","重電","客製板金"];
  const priorityOpts=["高","中","低"];
  $("modal-box").innerHTML=`
    <div class="modal-head"><div class="modal-title">✏️ 編輯工單 ${o.id}</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div><label class="lbl">客戶名稱*</label><input class="inp" id="edf-customer" value="${esc(o.customer)}"></div>
      <div><label class="lbl">品名*</label><input class="inp" id="edf-part" value="${esc(o.part)}"></div>
      <div><label class="lbl">數量*</label><input class="inp" type="number" id="edf-qty" value="${o.qty}"></div>
      <div><label class="lbl">材質</label><input class="inp" id="edf-material" value="${esc(o.material||"")}"></div>
      <div><label class="lbl">截止日期</label><input class="inp" type="date" id="edf-deadline" value="${o.deadline||""}"></div>
      <div><label class="lbl">金額(NT$)</label><input class="inp" type="number" id="edf-amount" value="${o.amount||0}"></div>
    </div>
    <div class="form-grid">
      <div><label class="lbl">產業</label><select class="inp" id="edf-industry">${industryOpts.map(x=>`<option${o.industry===x?" selected":""}>${x}</option>`).join("")}</select></div>
      <div><label class="lbl">優先</label><select class="inp" id="edf-priority">${priorityOpts.map(x=>`<option${o.priority===x?" selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div class="form-grid">
      <div><label class="lbl">製程站點</label><select class="inp" id="edf-stage">${STAGES.map(s=>`<option value="${s.id}"${o.stage===s.id?" selected":""}>${s.label}</option>`).join("")}</select></div>
      <div><label class="lbl">狀態</label><select class="inp" id="edf-status">${statusOpts.map(x=>`<option${o.status===x?" selected":""}>${x}</option>`).join("")}</select></div>
    </div>
    <div style="margin-bottom:14px"><label class="lbl">備註</label><input class="inp" id="edf-note" value="${esc(o.note||"")}"></div>
    ${photoInput("edf-photos")}
    <div style="display:flex;gap:10px">
      <button class="accent-btn" style="flex:1;padding:11px" onclick="submitEditOrder('${o.id}')">💾 儲存變更</button>
      <button class="icon-btn" style="flex:1;padding:11px;text-align:center" onclick="closeModal()">取消</button>
    </div>
    ${currentUserRole==="admin"?`<button style="background:#7F1D1D;color:#FCA5A5;border:1px solid #991B1B;border-radius:10px;padding:10px;width:100%;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px" onclick="deleteOrder('${o.id}')">🗑️ 刪除此工單</button>`:""}`;
  $("modal-wrap").classList.add("show");
  setTimeout(()=>{
    if(o.photos&&o.photos.length){
      const el=$("edf-photos");
      if(el){el.value=JSON.stringify(o.photos);renderPhotoPreview("edf-photos",o.photos);}
    }
  },50);
}
async function submitEditOrder(id){
  const g=fid=>$(fid)?.value||"";
  const customer=g("edf-customer"), part=g("edf-part"), qty=g("edf-qty");
  if(!customer||!part||!qty){showToast("請填必填欄位","error");return;}
  const photos=JSON.parse(g("edf-photos")||"[]");
  const updates={customer,part,qty:parseInt(qty),material:g("edf-material"),stage:g("edf-stage"),priority:g("edf-priority"),deadline:g("edf-deadline"),amount:parseFloat(g("edf-amount"))||0,note:g("edf-note"),industry:g("edf-industry"),status:g("edf-status"),photos};
  try{
    await db.collection("orders").doc(id).set(updates,{merge:true});
    pushNotif(`工單 ${id} 已更新`,"success");
    showToast("工單已更新");
    closeModal();
  }catch(e){
    console.error("更新工單失敗:",e);
    showToast("更新工單失敗","error");
  }
}
async function deleteOrder(id){
  if(!confirm(`確定要刪除工單 ${id} 嗎？此操作無法復原。`))return;
  try{
    await db.collection("orders").doc(id).delete();
    pushNotif(`工單 ${id} 已刪除`,"warn");
    showToast("工單已刪除");
    closeModal();
  }catch(e){
    console.error("刪除工單失敗:",e);
    showToast("刪除工單失敗","error");
  }
}
function closeModal(){$("modal-wrap").classList.remove("show");}
function bindEvents(){}
$("ham-btn").addEventListener("click",()=>{$("sidebar").classList.add("open");$("scrim").classList.add("show");});
$("scrim").addEventListener("click",()=>{$("sidebar").classList.remove("open");$("scrim").classList.remove("show");});
$("notif-btn").addEventListener("click",()=>setTab("notif"));
$("modal-wrap").addEventListener("click",e=>{if(e.target===$("modal-wrap"))closeModal();});
window.addEventListener("load",()=>{
  if(navigator.standalone===false && /iPhone|iPad|iPod/.test(navigator.userAgent)){
    const b=document.createElement("div");
    b.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#172554;color:#93C5FD;padding:10px 16px;border-radius:12px;font-size:12px;font-family:'DM Sans',sans-serif;z-index:9000;text-align:center;border:1px solid #1E40AF;max-width:280px";
    b.innerHTML="📱 點 Safari 分享按鈕 → <strong>加入主畫面</strong>，即可像 App 使用！<br><button onclick='this.parentNode.remove()' style='background:none;border:none;color:#93C5FD;font-size:16px;cursor:pointer;float:right;margin-top:-6px'>✕</button>";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),8000);
  }
  onAuthStateChanged();
});
</script>
